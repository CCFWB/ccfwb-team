<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0D1117;color:#E6EDF3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#161B22;border:1px solid #30363D;border-radius:16px;padding:32px;max-width:480px;width:100%;}
.logo{font-size:26px;font-weight:800;color:#5279A0;margin-bottom:4px;}
.sub{font-size:13px;color:#7D8590;margin-bottom:6px;}
.badge{display:inline-block;background:#1F3550;color:#6B96C4;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:20px;}

p{font-size:13px;color:#7D8590;line-height:1.6;margin-bottom:18px;}

input{width:100%;padding:11px 14px;background:#0D1117;border:1px solid #30363D;border-radius:8px;color:#E6EDF3;font-size:14px;font-family:monospace;outline:none;margin-bottom:14px;}
input:focus{border-color:#5279A0;}
.btn{width:100%;padding:13px;background:#5279A0;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;}
.btn:hover{background:#3D5C82;}
.btn:disabled{opacity:.5;cursor:default;}
.status{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:13px;display:none;line-height:1.5;white-space:pre-line;}
.loading{background:#1C2D40;color:#7BA7BC;display:block;}
.success{background:#0E3320;color:#5DDA6F;display:block;}
.error{background:#3D0E0E;color:#FF7B7B;display:block;}
.tip{background:#1C2210;color:#8DB87A;font-size:12px;padding:10px 12px;border-radius:8px;margin-bottom:16px;line-height:1.6;}
a{color:#6B96C4;}
</style>

async function deploy(){
  const token=document.getElementById('token').value.trim();
  if(!token){showStatus('error','Please enter your GitHub token.');return;}
  const btn=document.getElementById('deployBtn');
  btn.disabled=true;btn.textContent='⏳ Deploying...';
  showStatus('loading','Connecting to GitHub...');
  try{
    showStatus('loading','Reading current file info...');
    const getRes=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+FILE+'?ref='+BRANCH,{
      headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}
    });
    if(!getRes.ok)throw new Error('Could not read repo. Check your token has repo scope.');
    const fileData=await getRes.json();
    showStatus('loading','Pushing v11 to GitHub...');
    const putRes=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+FILE,{
      method:'PUT',
      headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'Deploy CCFWB Team v11',content:V11_B64,sha:fileData.sha,branch:BRANCH})
    });
    if(!putRes.ok){const e=await putRes.json();throw new Error(e.message||'Push failed');}
    showStatus('success','✅ v11 deployed!\n\nGitHub Pages updates in ~60 seconds.\n🔗 ccfwb.github.io/ccfwb-team');
    btn.textContent='✅ Deployed!';
  }catch(e){
    showStatus('error','❌ '+(e.message||'Something went wrong. Try again.'));
    btn.disabled=false;btn.textContent='🚀 Deploy v11 to GitHub';
  }
}
function showStatus(type,msg){const el=document.getElementById('status');el.className='status '+type;el.textContent=msg;}
</script>
