<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CCFWB Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
:root {
  --ocean: #5279A0;
  --ocean-dark: #3F6285;
  --tide: #62A8AB;
  --yellow: #F4BE51;
  --sand: #EBE9DF;
  --sand-dark: #D8D5C8;
  --white: #FFFFFF;
  --text: #1a1a2e;
  --text-mid: #4a4a6a;
  --text-light: #8888aa;
  --border: #e0ddd4;
  --card-bg: #FFFFFF;
  --page-bg: #F5F3ED;
  --success: #4CAF50;
  --danger: #e74c3c;
  --warning: #F4BE51;
  --p1: #e74c3c;
  --p2: #e67e22;
  --p3: #5279A0;
  --p4: #62A8AB;
  --shadow: 0 2px 12px rgba(82,121,160,0.10);
  --shadow-lg: 0 8px 32px rgba(82,121,160,0.18);
  --radius: 12px;
  --radius-sm: 8px;
}
[data-theme="dark"] {
  --text: #e8e6f0;
  --text-mid: #b0aec8;
  --text-light: #7070a0;
  --border: #2e2e4a;
  --card-bg: #1e1e32;
  --page-bg: #13132a;
  --sand: #1a1a2e;
  --sand-dark: #2a2a42;
  --white: #1e1e32;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--page-bg);color:var(--text);min-height:100vh;transition:background 0.3s,color 0.3s;}

/* IDENTITY OVERLAY */
#identity-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--ocean) 0%,var(--tide) 100%);display:flex;align-items:center;justify-content:center;z-index:1000;}
.identity-box{background:rgba(255,255,255,0.95);border-radius:20px;padding:2.5rem;text-align:center;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.identity-box h1{font-family:'Lora',serif;font-size:1.8rem;color:var(--ocean);margin-bottom:0.4rem;}
.identity-box p{color:var(--text-mid);font-size:0.95rem;margin-bottom:2rem;}
.identity-btns{display:flex;flex-direction:column;gap:0.75rem;}
.identity-btn{padding:1rem;border-radius:var(--radius);border:2px solid var(--ocean);background:white;color:var(--ocean);font-size:1rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;}
.identity-btn:hover{background:var(--ocean);color:white;}

/* HEADER */
header{background:var(--ocean);color:white;padding:0.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(82,121,160,0.3);}
.header-left{display:flex;align-items:center;gap:0.75rem;}
.header-logo{font-family:'Lora',serif;font-size:1.1rem;font-weight:600;}
.header-clock{font-size:0.8rem;opacity:0.85;font-weight:300;}
.header-right{display:flex;align-items:center;gap:0.5rem;}
.header-user-badge{background:rgba(255,255,255,0.2);border-radius:20px;padding:0.3rem 0.75rem;font-size:0.8rem;font-weight:500;cursor:pointer;transition:background 0.2s;}
.header-user-badge:hover{background:rgba(255,255,255,0.35);}
.my-page-btn{background:var(--yellow);color:var(--ocean-dark);border:none;border-radius:20px;padding:0.3rem 0.75rem;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.my-page-btn:hover{background:#e6ad3a;}
.icon-btn{background:none;border:none;color:white;cursor:pointer;padding:0.3rem;border-radius:6px;font-size:1.1rem;transition:background 0.2s;display:flex;align-items:center;justify-content:center;}
.icon-btn:hover{background:rgba(255,255,255,0.2);}

/* TABS */
.tabs{background:var(--card-bg);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:0.8rem 1.1rem;font-size:0.85rem;font-weight:500;color:var(--text-mid);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all 0.2s;flex-shrink:0;}
.tab.active{color:var(--ocean);border-bottom-color:var(--ocean);font-weight:600;}
.tab:hover:not(.active){color:var(--text);background:var(--page-bg);}
.tab-badge{background:var(--p1);color:white;border-radius:10px;padding:1px 6px;font-size:0.7rem;margin-left:4px;font-weight:700;}

/* MAIN */
main{max-width:900px;margin:0 auto;padding:1.25rem;}

/* CARDS */
.task-card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);padding:1rem 1.1rem;margin-bottom:0.6rem;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.task-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.task-card.p1{border-left:4px solid var(--p1);}
.task-card.p2{border-left:4px solid var(--p2);}
.task-card.p3{border-left:4px solid var(--p3);}
.task-card.p4{border-left:4px solid var(--p4);}
.task-card.stale::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 70%,rgba(244,190,81,0.08));pointer-events:none;}
.task-card.overdue{border-top:2px solid var(--p1);}
.task-card.awaiting-input{border-left:4px solid #9b59b6;background:linear-gradient(135deg,var(--card-bg),rgba(155,89,182,0.04));}
.task-card.waiting-outside{border-left:4px solid var(--text-light);}
.task-row{display:flex;align-items:flex-start;gap:0.6rem;}
.task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:2px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.task-check:hover{border-color:var(--ocean);}
.task-check.done{background:var(--success);border-color:var(--success);color:white;font-size:10px;}
.task-main{flex:1;min-width:0;}
.task-title{font-size:0.93rem;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:0.25rem;}
.task-title.done{text-decoration:line-through;opacity:0.5;}
.task-meta{display:flex;flex-wrap:wrap;gap:0.35rem;align-items:center;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:0.72rem;font-weight:500;}
.badge-p1{background:#fdecea;color:#c0392b;}
.badge-p2{background:#fef3e2;color:#d35400;}
.badge-p3{background:#eaf0f8;color:#3F6285;}
.badge-p4{background:#e8f5f5;color:#4a8c8f;}
.badge-soft{background:#f0f0f0;color:#666;}
.badge-hard{background:#fdecea;color:#c0392b;}
.badge-input{background:#f3eafc;color:#7d3c98;}
.badge-waiting{background:#f5f5f5;color:#888;}
.badge-handoff{background:#e8f8f0;color:#1e8449;}
.badge-overdue{background:#fdecea;color:#c0392b;}
.badge-stale{background:#fef9e7;color:#b7950b;}
.badge-decision{background:#fdf3e7;color:#935116;}
.task-age{font-size:0.7rem;color:var(--text-light);margin-top:0.2rem;}
.glow-pulse{animation:glowPulse 3s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 rgba(244,190,81,0);}50%{box-shadow:0 0 12px rgba(244,190,81,0.4);}}

/* SECTION HEADERS */
.section-header{display:flex;align-items:center;justify-content:space-between;margin:1.2rem 0 0.6rem;}
.section-title{font-family:'Lora',serif;font-size:1rem;font-weight:600;color:var(--ocean);}
.add-btn{background:var(--ocean);color:white;border:none;border-radius:20px;padding:0.35rem 0.9rem;font-size:0.82rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;}
.add-btn:hover{background:var(--ocean-dark);}
.add-btn.secondary{background:transparent;color:var(--ocean);border:1.5px solid var(--ocean);}
.add-btn.secondary:hover{background:var(--ocean);color:white;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--text-light);}
.empty-state .emoji{font-size:2rem;margin-bottom:0.5rem;}
.empty-state p{font-size:0.9rem;}

/* MODALS */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:flex-end;justify-content:center;}
.modal-backdrop.center{align-items:center;}
.modal{background:var(--card-bg);border-radius:var(--radius) var(--radius) 0 0;padding:1.5rem;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;}
.modal-backdrop.center .modal{border-radius:var(--radius);max-height:85vh;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.modal-title{font-family:'Lora',serif;font-size:1.1rem;font-weight:600;color:var(--ocean);}
.close-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-mid);padding:0.2rem;}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:0.82rem;font-weight:600;color:var(--text-mid);margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.04em;}
input,textarea,select{width:100%;padding:0.65rem 0.8rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:0.92rem;color:var(--text);background:var(--card-bg);transition:border 0.2s;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ocean);}
textarea{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.btn-primary{background:var(--ocean);color:white;border:none;border-radius:var(--radius-sm);padding:0.75rem 1.25rem;font-size:0.93rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;transition:background 0.2s;margin-top:0.5rem;}
.btn-primary:hover{background:var(--ocean-dark);}
.btn-danger{background:var(--danger);color:white;border:none;border-radius:var(--radius-sm);padding:0.75rem 1.25rem;font-size:0.93rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;transition:background 0.2s;margin-top:0.5rem;}
.btn-secondary{background:transparent;color:var(--ocean);border:1.5px solid var(--ocean);border-radius:var(--radius-sm);padding:0.7rem 1.25rem;font-size:0.93rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;transition:all 0.2s;margin-top:0.5rem;}
.btn-secondary:hover{background:var(--ocean);color:white;}
.btn-row{display:flex;gap:0.6rem;}
.btn-row .btn-primary,.btn-row .btn-secondary,.btn-row .btn-danger{margin-top:0;}

/* PERSONAL PAGE */
#personal-page{position:fixed;inset:0;background:var(--page-bg);z-index:200;overflow-y:auto;display:none;}
#personal-page.open{display:block;}
.personal-header{background:linear-gradient(135deg,var(--ocean),var(--tide));color:white;padding:1.25rem;display:flex;align-items:center;justify-content:space-between;}
.personal-header h2{font-family:'Lora',serif;font-size:1.3rem;}
.personal-back-btn{background:rgba(255,255,255,0.2);border:none;color:white;border-radius:20px;padding:0.4rem 1rem;font-size:0.85rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;}
.personal-back-btn:hover{background:rgba(255,255,255,0.35);}
.personal-tabs{background:var(--card-bg);border-bottom:1px solid var(--border);display:flex;}
.personal-tab{padding:0.8rem 1.25rem;font-size:0.85rem;font-weight:500;color:var(--text-mid);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;}
.personal-tab.active{color:var(--ocean);border-bottom-color:var(--ocean);font-weight:600;}

/* BRIEFING */
.briefing-card{background:linear-gradient(135deg,rgba(82,121,160,0.07),rgba(98,168,171,0.07));border:1px solid rgba(82,121,160,0.2);border-radius:var(--radius);padding:1rem;margin-bottom:0.6rem;position:relative;}
.briefing-item{display:flex;align-items:flex-start;gap:0.6rem;padding:0.5rem 0;border-bottom:1px solid var(--border);}
.briefing-item:last-child{border-bottom:none;}
.briefing-item-text{flex:1;font-size:0.9rem;color:var(--text);}
.briefing-item-meta{font-size:0.72rem;color:var(--text-light);margin-top:2px;}
.briefing-delete{background:none;border:none;color:var(--text-light);cursor:pointer;font-size:0.85rem;padding:0.1rem 0.3rem;}
.briefing-delete:hover{color:var(--danger);}

/* WIN WALL */
.win-card{background:linear-gradient(135deg,rgba(244,190,81,0.1),rgba(98,168,171,0.1));border:1px solid rgba(244,190,81,0.3);border-radius:var(--radius);padding:0.85rem 1rem;margin-bottom:0.5rem;display:flex;align-items:flex-start;gap:0.6rem;}
.win-emoji{font-size:1.2rem;}
.win-text{font-size:0.88rem;color:var(--text);}
.win-meta{font-size:0.72rem;color:var(--text-light);margin-top:2px;}

/* CREATIVE KANBAN */
.kanban-board{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-top:0.75rem;}
.kanban-col{background:var(--page-bg);border-radius:var(--radius);padding:0.75rem;}
.kanban-col-title{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-mid);margin-bottom:0.6rem;padding-bottom:0.4rem;border-bottom:2px solid var(--border);}
.kanban-card{background:var(--card-bg);border-radius:var(--radius-sm);padding:0.7rem;margin-bottom:0.5rem;border:1px solid var(--border);font-size:0.85rem;cursor:pointer;transition:all 0.2s;}
.kanban-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}

/* SETTINGS */
.settings-section{margin-bottom:1.5rem;}
.settings-title{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-light);margin-bottom:0.75rem;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:0.65rem 0;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:0.9rem;color:var(--text);}
.settings-value{font-size:0.82rem;color:var(--text-mid);}
.toggle{width:40px;height:22px;background:var(--border);border-radius:11px;cursor:pointer;position:relative;transition:background 0.2s;}
.toggle.on{background:var(--ocean);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:white;border-radius:50%;transition:left 0.2s;}
.toggle.on::after{left:21px;}

/* AGENDA */
.agenda-section{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);padding:1rem;margin-bottom:0.75rem;}
.agenda-section-title{font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.6rem;}
.agenda-item{font-size:0.88rem;color:var(--text-mid);padding:0.3rem 0;border-bottom:1px solid var(--border);display:flex;gap:0.5rem;}
.agenda-item:last-child{border-bottom:none;}
.agenda-item-dot{color:var(--ocean);flex-shrink:0;}

/* TOAST */
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:0.65rem 1.25rem;border-radius:20px;font-size:0.88rem;z-index:1000;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* SYNC INDICATOR */
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--success);display:inline-block;margin-left:4px;}
.sync-dot.syncing{background:var(--yellow);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* ARCHIVE */
.archive-search{position:relative;margin-bottom:1rem;}
.archive-search input{padding-left:2.2rem;}
.archive-search::before{content:'🔍';position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);font-size:0.85rem;}

/* DECISION PENDING */
.decision-banner{background:linear-gradient(135deg,rgba(243,156,18,0.1),rgba(230,126,34,0.08));border:1px solid rgba(243,156,18,0.3);border-radius:var(--radius);padding:0.85rem 1rem;margin-bottom:0.75rem;}
.decision-banner-title{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#935116;margin-bottom:0.4rem;}

/* PRAYER FIELD */
.prayer-field{background:linear-gradient(135deg,rgba(82,121,160,0.05),rgba(98,168,171,0.05));border:1px solid rgba(82,121,160,0.15);border-radius:var(--radius-sm);padding:0.65rem 0.8rem;font-size:0.85rem;color:var(--text-mid);font-style:italic;margin-top:0.5rem;}
.prayer-label{font-size:0.7rem;color:var(--ocean);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:0.3rem;}

/* RESPONSIVE */
@media(max-width:600px){
  .form-row{grid-template-columns:1fr;}
  .kanban-board{grid-template-columns:1fr 1fr;}
  header{padding:0.65rem 1rem;}
}

/* TEMPLATES */
.template-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:1rem;}
.template-card{background:var(--page-bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0.75rem;cursor:pointer;transition:all 0.2s;text-align:center;}
.template-card:hover{border-color:var(--ocean);background:rgba(82,121,160,0.05);}
.template-card .t-emoji{font-size:1.4rem;display:block;margin-bottom:0.3rem;}
.template-card .t-name{font-size:0.8rem;font-weight:600;color:var(--text);}

/* HANDOFF BANNER */
.handoff-banner{background:linear-gradient(135deg,rgba(30,132,73,0.08),rgba(98,168,171,0.06));border:1px solid rgba(30,132,73,0.2);border-radius:var(--radius-sm);padding:0.5rem 0.75rem;font-size:0.8rem;color:#1e8449;margin-top:0.4rem;display:flex;align-items:center;gap:0.4rem;}

/* INPUT REQUEST BANNER */
.input-banner{background:linear-gradient(135deg,rgba(155,89,182,0.08),rgba(82,121,160,0.05));border:1px solid rgba(155,89,182,0.2);border-radius:var(--radius-sm);padding:0.5rem 0.75rem;font-size:0.8rem;color:#7d3c98;margin-top:0.4rem;}
</style>
</head>
<body>

<!-- IDENTITY OVERLAY -->
<div id="identity-overlay">
  <div class="identity-box">

</div>

<!-- PERSONAL PAGE -->
<div id="personal-page">

</div>

<!-- MAIN APP -->
<header>

<div class="tabs" id="main-tabs">

  <div class="tab" onclick="switchTab('agenda',this)">📋 Agenda</div>
  <div class="tab" onclick="switchTab('archive',this)">📁 Archive</div>
</div>

<main id="main-content"></main>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODALS rendered by JS -->
<div id="modal-container"></div>

async function loadData() {
  setSyncStatus('syncing');
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { 'X-Master-Key': BIN_KEY }
    });
    const json = await r.json();
    const d = json.record;
    appData.tasks = d.tasks || [];
    appData.archivedTasks = d.archivedTasks || [];
    appData.creativeProjects = d.creativeProjects || [];
    appData.winWall = d.winWall || [];
    appData.briefings = d.briefings || { andy: [], kaitlyn: [], angie: [] };
    appData.prayerNotes = d.prayerNotes || { andy: '', kaitlyn: '', angie: '' };
    appData.installDate = d.installDate || new Date().toISOString();
    if (!d.installDate) schedSave();
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('error');
    toast('Could not load data — showing last state');
  }
}

async function saveData() {
  setSyncStatus('syncing');
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': BIN_KEY },
      body: JSON.stringify(appData)
    });
    lastSaved = new Date().toISOString();
    localStorage.setItem('ccfwb_lastSaved', lastSaved);
    setSyncStatus('ok');
    if (githubToken) backupToGitHub();
  } catch(e) {
    setSyncStatus('error');
  }
}

function schedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveData(), 1500);
}

function scheduleHourlySave() {
  setInterval(() => saveData(), 60 * 60 * 1000);
}

async function backupToGitHub() {
  if (!githubToken) return;
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(appData, null, 2))));
    const getRes = await fetch('https://api.github.com/repos/CCFWB/ccfwb-team/contents/backup.json', {
      headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    let sha = '';
    if (getRes.ok) { const fd = await getRes.json(); sha = fd.sha; }
    await fetch('https://api.github.com/repos/CCFWB/ccfwb-team/contents/backup.json', {
      method: 'PUT',
      headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Hourly backup', content, sha, branch: 'main' })
    });
  } catch(e) { /* silent */ }
}

function exportData() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ccfwb-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  toast('Backup downloaded ✓');
}

function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
  dot.title = state === 'ok' ? `Last saved: ${lastSaved ? new Date(lastSaved).toLocaleTimeString() : 'never'}` : state === 'syncing' ? 'Saving...' : 'Save error';
}

// ============================================================
// TASK RENDERING
// ============================================================
function taskAge(task) {
  const updated = task.updatedAt || task.createdAt;
  if (!updated) return '';
  const days = Math.floor((Date.now() - new Date(updated)) / 86400000);
  if (days === 0) return 'Updated today';
  if (days === 1) return 'Updated yesterday';
  return `Updated ${days} days ago`;
}

function isStale(task) {
  const updated = task.updatedAt || task.createdAt;
  if (!updated) return false;
  return Math.floor((Date.now() - new Date(updated)) / 86400000) >= 7;
}

function isOverdue(task) {
  if (!task.dueDate || task.completed) return false;
  // Use end of day so a task due "today" is not overdue until midnight local time
  return new Date(task.dueDate + 'T23:59:59') < new Date();
}

function renderTaskCard(task, showAssignee = false) {
  const stale = isStale(task);
  const overdue = isOverdue(task);
  let classes = `task-card p${task.priority||4}`;
  if (stale && !task.completed) classes += ' stale glow-pulse';
  if (overdue) classes += ' overdue';
  if (task.awaitingInputFrom) classes += ' awaiting-input';
  if (task.status === 'waiting-outside') classes += ' waiting-outside';

  let badges = '';
  if (task.priority) badges += `<span class="badge badge-p${task.priority}">P${task.priority}</span>`;
  if (overdue) badges += `<span class="badge badge-overdue">⚠ Overdue</span>`;
  if (stale && !task.completed) badges += `<span class="badge badge-stale">🕰 Long open</span>`;
  if (task.dueDateType === 'hard' && task.dueDate) badges += `<span class="badge badge-hard">🔴 Due ${formatDate(task.dueDate)}</span>`;
  else if (task.dueDate) badges += `<span class="badge badge-soft">📅 ${formatDate(task.dueDate)}</span>`;
  if (task.status === 'decision-pending') badges += `<span class="badge badge-decision">⏳ Decision Pending</span>`;
  if (task.status === 'waiting-outside') badges += `<span class="badge badge-waiting">⏸ Waiting: ${task.waitingFor||'outside'}</span>`;
  if (task.awaitingInputFrom) badges += `<span class="badge badge-input">💬 Input from ${task.awaitingInputFrom}</span>`;
  if (task.handoffFrom) badges += `<span class="badge badge-handoff">↩ From ${task.handoffFrom}</span>`;
  if (showAssignee && task.assignedTo) badges += `<span class="badge badge-p3">👤 ${task.assignedTo}</span>`;
  if (task.recurring) badges += `<span class="badge badge-p4">🔄 Recurring</span>`;

  return `<div class="${classes}" onclick="openTask('${task.id}')">
    <div class="task-row">
      <div class="task-check ${task.completed?'done':''}" onclick="event.stopPropagation();toggleComplete('${task.id}')">${task.completed?'✓':''}</div>
      <div class="task-main">
        <div class="task-title ${task.completed?'done':''}">${escHtml(task.title)}</div>
        <div class="task-meta">${badges}</div>
        <div class="task-age">${taskAge(task)}</div>
        ${task.handoffFrom ? `<div class="handoff-banner">↩ Handed to you by ${escHtml(task.handoffFrom)}</div>` : ''}
        ${task.awaitingInputFrom ? `<div class="input-banner">💬 Waiting for input from ${escHtml(task.awaitingInputFrom)} — will return when submitted</div>` : ''}
      </div>
    </div>
  </div>`;
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ALL TASKS TAB
// ============================================================
function renderAllTasks() {
  const tasks = appData.tasks.filter(t => !t.completed && !t.awaitingInputFrom);
  const completed = appData.archivedTasks.slice(-5).reverse();
  const awaitingInput = appData.tasks.filter(t => t.awaitingInputFrom);

  let html = `<div class="section-header">
    <span class="section-title">All Active Tasks</span>
    <button class="add-btn" onclick="openAddTask()">+ Add Task</button>
  </div>`;

  // Decisions pending
  const decisions = tasks.filter(t => t.status === 'decision-pending');
  if (decisions.length) {
    html += `<div class="decision-banner"><div class="decision-banner-title">⏳ Awaiting Decisions</div>${decisions.map(t=>renderTaskCard(t,true)).join('')}</div>`;
  }

  // Awaiting input
  if (awaitingInput.length) {
    html += `<div class="section-header"><span class="section-title">💬 Awaiting Input</span></div>`;
    html += awaitingInput.map(t => renderTaskCard(t, true)).join('');
  }

  const active = tasks.filter(t => t.status !== 'decision-pending');
  if (active.length) {
    html += active.map(t => renderTaskCard(t, true)).join('');
  } else if (!decisions.length) {
    html += `<div class="empty-state"><div class="emoji">✅</div><p>All clear! No active tasks.</p></div>`;
  }

  if (completed.length) {
    html += `<div class="section-header"><span class="section-title">✅ Recently Completed</span></div>`;
    html += completed.slice(0,5).map(t => renderTaskCard(t, true)).join('');
  }
  return html;
}

// PERSON TAB
// ============================================================
function renderPersonTab(person) {
  const key = PEOPLE_KEYS[person];
  const tasks = appData.tasks.filter(t => t.assignedTo === person && !t.completed && !t.awaitingInputFrom);
  const inputTasks = appData.tasks.filter(t => t.awaitingInputFrom === person);
  const completed = appData.archivedTasks.filter(t => t.assignedTo === person && t.completed);
  const briefingItems = (appData.briefings[key] || []).filter(b => {
    // Show today's briefing items
    return b.date === todayStr();
  });

  let html = `<div class="section-header">
    <span class="section-title">${person}'s Tasks</span>
    <button class="add-btn" onclick="openAddTask('${person}')">+ Add</button>
  </div>`;

  // Briefing summary
  if (briefingItems.length) {
    html += `<div class="briefing-card"><div style="font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--ocean);margin-bottom:0.5rem;">📬 Today's Briefing</div>`;
    briefingItems.forEach(b => {
      html += `<div class="briefing-item"><div class="briefing-item-text">${escHtml(b.text)}<div class="briefing-item-meta">Added by ${escHtml(b.addedBy)}</div></div></div>`;
    });
    html += `</div>`;
  }

  // Input requests
  if (inputTasks.length) {
    html += `<div class="section-header"><span class="section-title">💬 Needs Your Input</span></div>`;
    html += inputTasks.map(t => renderTaskCard(t)).join('');
  }

  // Decisions
  const decisions = tasks.filter(t => t.status === 'decision-pending');
  if (decisions.length) {
    html += `<div class="decision-banner"><div class="decision-banner-title">⏳ Awaiting Your Decision</div>${decisions.map(t=>renderTaskCard(t)).join('')}</div>`;
  }

  const active = tasks.filter(t => t.status !== 'decision-pending');
  if (active.length) {
    html += active.map(t => renderTaskCard(t)).join('');
  } else if (!decisions.length && !inputTasks.length) {
    html += `<div class="empty-state"><div class="emoji">✝️</div><p>Nothing on the list — all clear!</p></div>`;
  }

  if (completed.slice(0,3).length) {
    html += `<div class="section-header"><span class="section-title">✅ Recent Completions</span></div>`;
    html += completed.slice(0,3).map(t => renderTaskCard(t)).join('');
  }
  return html;
}

// ============================================================
// AGENDA
// ============================================================
function renderAgenda() {
  const now = new Date();
  const todayEnd = new Date(); todayEnd.setHours(23,59,59,999);
  const weekEnd = new Date(); weekEnd.setDate(weekEnd.getDate()+7);

  const overdue = appData.tasks.filter(t=>!t.completed&&t.dueDate&&new Date(t.dueDate)<now);
  const dueToday = appData.tasks.filter(t=>!t.completed&&t.dueDate&&new Date(t.dueDate+'T00:00:00')<=todayEnd&&new Date(t.dueDate+'T00:00:00')>=now);
  const thisWeek = appData.tasks.filter(t=>!t.completed&&t.dueDate&&new Date(t.dueDate)>todayEnd&&new Date(t.dueDate)<=weekEnd);
  const decisions = appData.tasks.filter(t=>!t.completed&&t.status==='decision-pending');
  const stale = appData.tasks.filter(t=>!t.completed&&isStale(t));

  let html = `<div class="section-header"><span class="section-title">📋 Meeting Agenda</span></div>`;

  const section = (title, items, emoji) => {
    if (!items.length) return '';
    return `<div class="agenda-section">
      <div class="agenda-section-title" style="color:var(--ocean)">${emoji} ${title} (${items.length})</div>
      ${items.map(t=>`<div class="agenda-item"><span class="agenda-item-dot">•</span><span>${escHtml(t.title)} <span style="color:var(--text-light);font-size:0.8rem;">— ${escHtml(t.assignedTo||'')}</span></span></div>`).join('')}
    </div>`;
  };

  html += section('Overdue — Needs Immediate Action', overdue, '🔴');
  html += section('Due Today', dueToday, '📅');
  html += section('This Week', thisWeek, '📆');
  html += section('Awaiting Decisions', decisions, '⏳');
  html += section('Long Open (7+ days)', stale, '🕰');

  if (!overdue.length && !dueToday.length && !thisWeek.length && !decisions.length && !stale.length) {
    html += `<div class="empty-state"><div class="emoji">✝️</div><p>Nothing pressing — great week ahead!</p></div>`;
  }
  return html;
}

// ============================================================
// MORNING EMAIL CHECK
// ============================================================
function checkMorningBriefing() {
  const now = new Date();
  const hour = now.getHours();
  const todayKey = `ccfwb_email_sent_${todayStr()}`;
  // Only attempt if it's between 7am and 8am and not sent today
  if (hour >= 7 && hour < 8 && !localStorage.getItem(todayKey)) {
    sendMorningEmails();
    localStorage.setItem(todayKey, '1');
  }
}

function isFirstWeek() {
  if (!appData.installDate) return true;
  const installDate = new Date(appData.installDate);
  const daysSince = (Date.now() - installDate) / 86400000;
  return daysSince <= 8;
}

async function sendMorningEmails() {
  const firstEightDays = isFirstWeek();
  const testNote = firstEightDays
    ? '\n\n---\n📱 NOTE: This email is a test function of the in-house Calvary Chapel FWB Church management app. If you notice any glitches or have suggestions, please let Angie know (admin@calvarychapelfwb.org).'
    : '';

  // During first 8 days only send to Angie for testing
  const recipients = firstEightDays ? ['Angie'] : PEOPLE;

  for (const person of recipients) {
    const key = PEOPLE_KEYS[person];
    const email = PEOPLE_EMAILS[person];
    const tasks = appData.tasks.filter(t => t.assignedTo === person && !t.completed);
    const briefing = (appData.briefings[key] || []).filter(b => b.date === todayStr());
    const overdue = tasks.filter(t => isOverdue(t));
    const decisions = tasks.filter(t => t.status === 'decision-pending');
    const inputNeeded = appData.tasks.filter(t => t.awaitingInputFrom === person);

    let body = `Good morning, ${person}! ☀️\n\nHere's your briefing for today:\n\n`;

    if (briefing.length) {
      body += `📬 BRIEFING ITEMS:\n`;
      briefing.forEach(b => { body += `  • ${b.text}\n`; });
      body += '\n';
    }
    if (overdue.length) {
      body += `⚠️ OVERDUE (${overdue.length}):\n`;
      overdue.forEach(t => { body += `  • ${t.title}\n`; });
      body += '\n';
    }
    if (decisions.length) {
      body += `⏳ AWAITING YOUR DECISION (${decisions.length}):\n`;
      decisions.forEach(t => { body += `  • ${t.title}\n`; });
      body += '\n';
    }
    if (inputNeeded.length) {
      body += `💬 INPUT REQUESTED FROM YOU (${inputNeeded.length}):\n`;
      inputNeeded.forEach(t => { body += `  • ${t.title} (from ${t.inputRequestFrom||'team'})\n`; });
      body += '\n';
    }
    if (tasks.length) {
      body += `📋 YOUR ACTIVE TASKS (${tasks.length}):\n`;
      tasks.slice(0,10).forEach(t => { body += `  • ${t.title}${t.dueDate?' — Due '+formatDate(t.dueDate):''}\n`; });
      body += '\n';
    }

    body += `🔗 Open the app: ${APP_URL}${testNote}`;

    try {
      await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
        to_name: person,
        to_email: email,
        subject: `CCFWB Morning Briefing — ${new Date().toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'})}`,
        message: body
      });
    } catch(e) { console.log('Email error for', person, e); }
  }
  localStorage.setItem('ccfwb_email_today_sent', '1');
}

// ============================================================
function toggleComplete(id) {
  const task = appData.tasks.find(t => t.id === id);
  if (!task) return;
  if (!task.completed) {
    // Archive prompt
    const note = prompt('Add a completion note (optional):') || '';
    task.completed = true;
    task.completedAt = new Date().toISOString();
    task.updatedAt = new Date().toISOString();
    // Add to win wall
    appData.winWall.push({ id: uid(), title: task.title, person: task.assignedTo || 'Team', date: new Date().toISOString() });
    // Archive
    appData.archivedTasks.push({ ...task, archiveNote: note });
    // Handle recurring
    if (task.recurring && task.dueDate) {
      const newTask = { ...task, id: uid(), completed: false, completedAt: null, updatedAt: new Date().toISOString(), createdAt: new Date().toISOString() };
      const nextDue = new Date(task.dueDate + 'T00:00:00');
      nextDue.setDate(nextDue.getDate() + 7);
      newTask.dueDate = nextDue.toISOString().split('T')[0];
      appData.tasks.push(newTask);
    }
    appData.tasks = appData.tasks.filter(t => t.id !== id);
  } else {
    task.completed = false;
    task.completedAt = null;
    task.updatedAt = new Date().toISOString();
  }
  schedSave();
  renderCurrentTab();
  updateTabBadges();
}

        ${cols.map(c=>`<option value="${c}" ${proj.status===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="moveCreativeProject('${id}')">Update Stage</button>
      <button class="btn-danger" onclick="deleteCreativeProject('${id}')">Delete</button>
    </div>
  `, true);
}

function moveCreativeProject(id) {
  const proj = appData.creativeProjects.find(p => p.id === id);
  if (!proj) return;
  const newStatus = document.getElementById('cp-status-sel').value;
  if (newStatus === 'Published') {
    appData.winWall.push({ id: uid(), title: `Creative: ${proj.title}`, person: 'Kaitlyn', date: new Date().toISOString() });
  }
  proj.status = newStatus;
  closeModal();
  schedSave();
  renderCurrentTab();
  toast(`Moved to ${newStatus} ✓`);
}

function deleteCreativeProject(id) {
  if (!confirm('Delete this project?')) return;
  appData.creativeProjects = appData.creativeProjects.filter(p => p.id !== id);
  closeModal();
  schedSave();
  renderCurrentTab();
  toast('Project deleted');
}

function saveGithubToken() {

// ============================================================
// DARK MODE
// ============================================================
function toggleDark(toggleEl) {
  darkMode = !darkMode;
  localStorage.setItem('ccfwb_dark', darkMode);
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : '');
  if (toggleEl) toggleEl.classList.toggle('on', darkMode);
}

// ============================================================
// MODAL HELPERS
// ============================================================
function showModal(html, center = false) {
  const c = document.getElementById('modal-container');
  c.innerHTML = `<div class="modal-backdrop ${center?'center':''}" onclick="handleBackdropClick(event)">
    <div class="modal">${html}</div>
  </div>`;
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
  editingTask = null;
}

function handleBackdropClick(e) {
  if (e.target.classList.contains('modal-backdrop')) closeModal();
}

// ============================================================
// TOAST
// ============================================================
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ============================================================
// UTILS
// ============================================================
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function filterCreative(cat) {
  // Simple filter — re-render with filter applied
  const c = document.getElementById('main-content');
  const cols = ['Idea','In Progress','In Review','Published'];
  let html = `<div class="section-header">
    <span class="section-title">Creative Ministries ${cat?`— ${cat}`:''}</span>
    <button class="add-btn" onclick="openAddCreative()">+ New Project</button>
  </div>
  <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.75rem;">
    ${['Digital Media','Audio/Visual','Ads & Promotions','Video Projects'].map(c2=>`<span class="badge badge-p3" style="cursor:pointer;opacity:${cat&&cat!==c2?'0.5':'1'}" onclick="filterCreative('${c2}')">${c2}</span>`).join('')}
    <span class="badge badge-soft" style="cursor:pointer" onclick="filterCreative('')">All</span>
  </div>
  <div class="kanban-board">`;
  cols.forEach(col => {
    let projs = appData.creativeProjects.filter(p => p.status === col);
    if (cat) projs = projs.filter(p => p.category === cat);
    html += `<div class="kanban-col">
      <div class="kanban-col-title">${col} <span style="color:var(--text-light)">(${projs.length})</span></div>`;
    projs.forEach(p => {
      html += `<div class="kanban-card" onclick="openCreativeProject('${p.id}')">
        <div style="font-weight:600;font-size:0.85rem;margin-bottom:0.3rem;">${escHtml(p.title)}</div>
        <div style="font-size:0.75rem;color:var(--text-mid)">${escHtml(p.category||'')}</div>
        ${p.dueDate?`<div style="font-size:0.72rem;color:var(--text-light);margin-top:0.3rem;">📅 ${formatDate(p.dueDate)}</div>`:''}
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  c.innerHTML = html;
}

init();
