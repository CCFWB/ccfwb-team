<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CCFWB Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="https://upload-widget.cloudinary.com/global/all.js"></script>
<style>
:root {
  --ocean: #5279A0;--ocean-dark: #3F6285;--tide: #62A8AB;--yellow: #F4BE51;
  --sand: #EBE9DF;--sand-dark: #D8D5C8;--white: #FFFFFF;
  --text: #1a1a2e;--text-mid: #4a4a6a;--text-light: #8888aa;
  --border: #e0ddd4;--card-bg: #FFFFFF;--page-bg: #F5F3ED;
  --success: #4CAF50;--danger: #e74c3c;--warning: #F4BE51;
  --p1: #e74c3c;--p2: #e67e22;--p3: #5279A0;--p4: #62A8AB;
  --purple: #8e44ad;--green: #1e8449;
  --shadow: 0 2px 12px rgba(82,121,160,0.10);
  --shadow-lg: 0 8px 32px rgba(82,121,160,0.18);
  --radius: 12px;--radius-sm: 8px;
}
[data-theme="dark"]{
  --text:#e8e6f0;--text-mid:#b0aec8;--text-light:#7070a0;
  --border:#2e2e4a;--card-bg:#1e1e32;--page-bg:#13132a;
  --sand:#1a1a2e;--sand-dark:#2a2a42;--white:#1e1e32;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--page-bg);color:var(--text);min-height:100vh;transition:background 0.3s,color 0.3s;}

/* IDENTITY */
#identity-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--ocean),var(--tide));display:flex;align-items:center;justify-content:center;z-index:1000;}
.identity-box{background:rgba(255,255,255,0.95);border-radius:20px;padding:2.5rem;text-align:center;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.identity-box h1{font-family:'Lora',serif;font-size:1.8rem;color:var(--ocean);margin-bottom:0.4rem;}
.identity-box p{color:var(--text-mid);font-size:0.95rem;margin-bottom:2rem;}
.identity-btns{display:flex;flex-direction:column;gap:0.75rem;}
.identity-btn{padding:1rem;border-radius:var(--radius);border:2px solid var(--ocean);background:white;color:var(--ocean);font-size:1rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;}
.identity-btn:hover{background:var(--ocean);color:white;}

/* HEADER */
header{background:var(--ocean);color:white;padding:0.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(82,121,160,0.3);}
.header-left{display:flex;align-items:center;gap:0.75rem;}
.header-logo{font-family:'Lora',serif;font-size:1.1rem;font-weight:600;}
.header-clock{font-size:0.8rem;opacity:0.85;font-weight:300;}
.header-right{display:flex;align-items:center;gap:0.5rem;}
.my-page-btn{background:var(--yellow);color:var(--ocean-dark);border:none;border-radius:20px;padding:0.3rem 0.75rem;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.my-page-btn:hover{background:#e6ad3a;}
.icon-btn{background:none;border:none;color:white;cursor:pointer;padding:0.3rem;border-radius:6px;font-size:1.1rem;transition:background 0.2s;display:flex;align-items:center;justify-content:center;}
.icon-btn:hover{background:rgba(255,255,255,0.2);}

/* ANNOUNCEMENT BANNER */
.announcement-banner{background:linear-gradient(135deg,var(--yellow),#e6ad3a);color:#1a1a2e;padding:0.65rem 1.25rem;display:flex;align-items:center;justify-content:space-between;font-size:0.88rem;font-weight:500;}
.announcement-dismiss{background:none;border:none;cursor:pointer;font-size:1rem;padding:0.1rem 0.3rem;color:#1a1a2e;opacity:0.6;}
.announcement-dismiss:hover{opacity:1;}

/* TABS */
.tabs{background:var(--card-bg);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:0.8rem 1.1rem;font-size:0.85rem;font-weight:500;color:var(--text-mid);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all 0.2s;flex-shrink:0;}
.tab.active{color:var(--ocean);border-bottom-color:var(--ocean);font-weight:600;}
.tab:hover:not(.active){color:var(--text);background:var(--page-bg);}
.tab-badge{background:var(--p1);color:white;border-radius:10px;padding:1px 6px;font-size:0.7rem;margin-left:4px;font-weight:700;}

/* MAIN */
main{max-width:900px;margin:0 auto;padding:1.25rem;}

/* CARDS */
.task-card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);padding:1rem 1.1rem;margin-bottom:0.6rem;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.task-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.task-card.p1{border-left:4px solid var(--p1);}
.task-card.p2{border-left:4px solid var(--p2);}
.task-card.p3{border-left:4px solid var(--p3);}
.task-card.p4{border-left:4px solid var(--p4);}
.task-card.stale{box-shadow:0 0 0 rgba(244,190,81,0);}
.task-card.glow-pulse{animation:glowPulse 3s ease-in-out infinite;}
.task-card.overdue{border-top:2px solid var(--p1);}
.task-card.awaiting-input{border-left:4px solid var(--purple);}
.task-card.waiting-outside{border-left:4px solid var(--text-light);}
.task-card.blocked{border-left:4px solid #e67e22;opacity:0.8;}
.task-card.escalated{box-shadow:0 0 16px rgba(231,76,60,0.35);animation:escalateGlow 2s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 rgba(244,190,81,0);}50%{box-shadow:0 0 12px rgba(244,190,81,0.4);}}
@keyframes escalateGlow{0%,100%{box-shadow:0 0 8px rgba(231,76,60,0.2);}50%{box-shadow:0 0 20px rgba(231,76,60,0.5);}}
.task-row{display:flex;align-items:flex-start;gap:0.6rem;}
.task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:2px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.task-check:hover{border-color:var(--ocean);}
.task-check.done{background:var(--success);border-color:var(--success);color:white;font-size:10px;}
.task-main{flex:1;min-width:0;}
.task-title{font-size:0.93rem;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:0.25rem;}
.task-title.done{text-decoration:line-through;opacity:0.5;}
.task-meta{display:flex;flex-wrap:wrap;gap:0.35rem;align-items:center;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:0.72rem;font-weight:500;}
.badge-p1{background:#fdecea;color:#c0392b;}
.badge-p2{background:#fef3e2;color:#d35400;}
.badge-p3{background:#eaf0f8;color:#3F6285;}
.badge-p4{background:#e8f5f5;color:#4a8c8f;}
.badge-soft{background:#f0f0f0;color:#666;}
.badge-hard{background:#fdecea;color:#c0392b;}
.badge-input{background:#f3eafc;color:#7d3c98;}
.badge-waiting{background:#f5f5f5;color:#888;}
.badge-handoff{background:#e8f8f0;color:#1e8449;}
.badge-overdue{background:#fdecea;color:#c0392b;}
.badge-stale{background:#fef9e7;color:#b7950b;}
.badge-decision{background:#fdf3e7;color:#935116;}
.badge-review{background:#f0e6ff;color:#6c3483;}
.badge-approved{background:#e8f8f0;color:#1e8449;}
.badge-changes{background:#fdecea;color:#c0392b;}
.badge-blocked{background:#fef3e2;color:#d35400;}
.badge-notify{background:#e8f5f5;color:#4a8c8f;}
.task-age{font-size:0.7rem;color:var(--text-light);margin-top:0.2rem;}
.handoff-banner{background:linear-gradient(135deg,rgba(30,132,73,0.08),rgba(98,168,171,0.06));border:1px solid rgba(30,132,73,0.2);border-radius:var(--radius-sm);padding:0.5rem 0.75rem;font-size:0.8rem;color:#1e8449;margin-top:0.4rem;display:flex;align-items:center;gap:0.4rem;}
.input-banner{background:linear-gradient(135deg,rgba(155,89,182,0.08),rgba(82,121,160,0.05));border:1px solid rgba(155,89,182,0.2);border-radius:var(--radius-sm);padding:0.5rem 0.75rem;font-size:0.8rem;color:#7d3c98;margin-top:0.4rem;}
.blocked-banner{background:linear-gradient(135deg,rgba(230,126,34,0.08),rgba(243,156,18,0.05));border:1px solid rgba(230,126,34,0.2);border-radius:var(--radius-sm);padding:0.5rem 0.75rem;font-size:0.8rem;color:#d35400;margin-top:0.4rem;}

/* SECTION HEADERS */
.section-header{display:flex;align-items:center;justify-content:space-between;margin:1.2rem 0 0.6rem;}
.section-title{font-family:'Lora',serif;font-size:1rem;font-weight:600;color:var(--ocean);}
.add-btn{background:var(--ocean);color:white;border:none;border-radius:20px;padding:0.35rem 0.9rem;font-size:0.82rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;}
.add-btn:hover{background:var(--ocean-dark);}
.add-btn.secondary{background:transparent;color:var(--ocean);border:1.5px solid var(--ocean);}
.add-btn.secondary:hover{background:var(--ocean);color:white;}
.add-btn.danger{background:var(--danger);}
.add-btn.success{background:var(--green);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--text-light);}
.empty-state .emoji{font-size:2rem;margin-bottom:0.5rem;}

/* MODALS */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:flex-end;justify-content:center;}
.modal-backdrop.center{align-items:center;}
.modal{background:var(--card-bg);border-radius:var(--radius) var(--radius) 0 0;padding:1.5rem;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;}
.modal-backdrop.center .modal{border-radius:var(--radius);max-height:88vh;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.modal-title{font-family:'Lora',serif;font-size:1.1rem;font-weight:600;color:var(--ocean);}
.close-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-mid);padding:0.2rem;}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:0.82rem;font-weight:600;color:var(--text-mid);margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.04em;}
input,textarea,select{width:100%;padding:0.65rem 0.8rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:0.92rem;color:var(--text);background:var(--card-bg);transition:border 0.2s;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ocean);}
textarea{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;}
.btn-primary{background:var(--ocean);color:white;border:none;border-radius:var(--radius-sm);padding:0.75rem 1.25rem;font-size:0.93rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;transition:background 0.2s;margin-top:0.5rem;}
.btn-primary:hover{background:var(--ocean-dark);}
.btn-danger{background:var(--danger);color:white;border:none;border-radius:var(--radius-sm);padding:0.75rem 1.25rem;font-size:0.93rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;transition:background 0.2s;margin-top:0.5rem;}
.btn-success{background:var(--green);color:white;border:none;border-radius:var(--radius-sm);padding:0.75rem 1.25rem;font-size:0.93rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;transition:background 0.2s;margin-top:0.5rem;}
.btn-secondary{background:transparent;color:var(--ocean);border:1.5px solid var(--ocean);border-radius:var(--radius-sm);padding:0.7rem 1.25rem;font-size:0.93rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;transition:all 0.2s;margin-top:0.5rem;}
.btn-secondary:hover{background:var(--ocean);color:white;}
.btn-row{display:flex;gap:0.6rem;}
.btn-row>*{margin-top:0;}

/* PERSONAL PAGE */
#personal-page{position:fixed;inset:0;background:var(--page-bg);z-index:200;overflow-y:auto;display:none;}
#personal-page.open{display:block;}
.personal-header{background:linear-gradient(135deg,var(--ocean),var(--tide));color:white;padding:1.25rem;display:flex;align-items:center;justify-content:space-between;}
.personal-header h2{font-family:'Lora',serif;font-size:1.3rem;}
.personal-back-btn{background:rgba(255,255,255,0.2);border:none;color:white;border-radius:20px;padding:0.4rem 1rem;font-size:0.85rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.personal-back-btn:hover{background:rgba(255,255,255,0.35);}
.personal-tabs{background:var(--card-bg);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;}
.personal-tabs::-webkit-scrollbar{display:none;}
.personal-tab{padding:0.8rem 1.1rem;font-size:0.85rem;font-weight:500;color:var(--text-mid);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap;}
.personal-tab.active{color:var(--ocean);border-bottom-color:var(--ocean);font-weight:600;}

/* BRIEFING */
.briefing-card{background:linear-gradient(135deg,rgba(82,121,160,0.07),rgba(98,168,171,0.07));border:1px solid rgba(82,121,160,0.2);border-radius:var(--radius);padding:1rem;margin-bottom:0.6rem;}
.briefing-item{display:flex;align-items:flex-start;gap:0.6rem;padding:0.5rem 0;border-bottom:1px solid var(--border);}
.briefing-item:last-child{border-bottom:none;}
.briefing-item-text{flex:1;font-size:0.9rem;color:var(--text);}
.briefing-item-meta{font-size:0.72rem;color:var(--text-light);margin-top:2px;}
.briefing-delete{background:none;border:none;color:var(--text-light);cursor:pointer;font-size:0.85rem;padding:0.1rem 0.3rem;}
.briefing-delete:hover{color:var(--danger);}

/* NOTES */
.note-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:0.85rem 1rem;margin-bottom:0.5rem;position:relative;}
.note-card.private{border-left:3px solid var(--purple);}
.note-card.team{border-left:3px solid var(--tide);}
.note-text{font-size:0.9rem;color:var(--text);line-height:1.5;margin-bottom:0.4rem;}
.note-meta{font-size:0.72rem;color:var(--text-light);display:flex;gap:0.5rem;align-items:center;}
.note-privacy-badge{font-size:0.68rem;padding:1px 6px;border-radius:10px;font-weight:600;}
.note-privacy-badge.private{background:#f3eafc;color:#6c3483;}
.note-privacy-badge.team{background:#e8f5f5;color:#4a8c8f;}
.note-delete{position:absolute;top:0.5rem;right:0.5rem;background:none;border:none;color:var(--text-light);cursor:pointer;font-size:0.85rem;}
.note-delete:hover{color:var(--danger);}

/* SHOUTOUTS */
.shoutout-card{background:linear-gradient(135deg,rgba(244,190,81,0.12),rgba(98,168,171,0.08));border:1px solid rgba(244,190,81,0.35);border-radius:var(--radius);padding:0.85rem 1rem;margin-bottom:0.5rem;display:flex;gap:0.75rem;align-items:flex-start;}
.shoutout-emoji{font-size:1.4rem;flex-shrink:0;}
.shoutout-text{font-size:0.9rem;color:var(--text);line-height:1.4;}
.shoutout-meta{font-size:0.72rem;color:var(--text-light);margin-top:3px;}

/* WIN WALL */
.win-card{background:linear-gradient(135deg,rgba(244,190,81,0.1),rgba(98,168,171,0.1));border:1px solid rgba(244,190,81,0.3);border-radius:var(--radius);padding:0.85rem 1rem;margin-bottom:0.5rem;display:flex;align-items:flex-start;gap:0.6rem;}
.win-emoji{font-size:1.2rem;}
.win-text{font-size:0.88rem;color:var(--text);}
.win-meta{font-size:0.72rem;color:var(--text-light);margin-top:2px;}

/* STREAK */
.streak-card{background:linear-gradient(135deg,var(--ocean),var(--tide));color:white;border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;text-align:center;}
.streak-nums{display:flex;justify-content:center;gap:2rem;margin-top:0.75rem;}
.streak-num{font-size:2rem;font-weight:700;}
.streak-label{font-size:0.75rem;opacity:0.85;}

/* CREATIVE KANBAN */
.kanban-board{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-top:0.75rem;}
.kanban-col{background:var(--page-bg);border-radius:var(--radius);padding:0.75rem;}
.kanban-col-title{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-mid);margin-bottom:0.6rem;padding-bottom:0.4rem;border-bottom:2px solid var(--border);}
.kanban-card{background:var(--card-bg);border-radius:var(--radius-sm);padding:0.7rem;margin-bottom:0.5rem;border:1px solid var(--border);font-size:0.85rem;cursor:pointer;transition:all 0.2s;}
.kanban-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}

/* MOOD BOARD */
.mood-board{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:0.5rem;margin-top:0.5rem;}
.mood-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--radius-sm);cursor:pointer;transition:transform 0.2s;}
.mood-img:hover{transform:scale(1.04);}
.mood-add{width:100%;aspect-ratio:1;border:2px dashed var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-light);font-size:1.5rem;transition:all 0.2s;background:transparent;}
.mood-add:hover{border-color:var(--ocean);color:var(--ocean);}

/* EVENTS */
.event-card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);padding:1rem 1.1rem;margin-bottom:0.6rem;cursor:pointer;transition:all 0.2s;border-left:4px solid var(--ocean);}
.event-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.event-card.soon{border-left-color:var(--p1);}
.event-card.this-week{border-left-color:var(--p2);}
.event-title{font-size:0.95rem;font-weight:600;color:var(--text);margin-bottom:0.3rem;}
.event-meta-row{display:flex;flex-wrap:wrap;gap:0.4rem;align-items:center;margin-bottom:0.3rem;}
.event-countdown{font-size:0.78rem;font-weight:700;color:var(--ocean);}
.event-countdown.soon{color:var(--p1);}
.event-progress{font-size:0.75rem;color:var(--text-light);}
.checklist-item{display:flex;align-items:center;gap:0.5rem;padding:0.4rem 0;border-bottom:1px solid var(--border);font-size:0.88rem;}
.checklist-item:last-child{border-bottom:none;}
.checklist-item.not-needed{opacity:0.4;text-decoration:line-through;}
.checklist-check{width:16px;height:16px;border-radius:3px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;}
.checklist-check.done{background:var(--success);border-color:var(--success);color:white;}
.checklist-toggle{font-size:0.72rem;color:var(--text-light);cursor:pointer;margin-left:auto;}
.checklist-toggle:hover{color:var(--ocean);}

/* ACTIVITY FEED */
.activity-item{display:flex;gap:0.6rem;padding:0.6rem 0;border-bottom:1px solid var(--border);font-size:0.85rem;}
.activity-item:last-child{border-bottom:none;}
.activity-icon{flex-shrink:0;width:24px;text-align:center;}
.activity-text{color:var(--text-mid);flex:1;line-height:1.4;}
.activity-time{font-size:0.72rem;color:var(--text-light);flex-shrink:0;}

/* APPROVAL */
.approval-queue-card{background:linear-gradient(135deg,rgba(108,52,131,0.07),rgba(82,121,160,0.05));border:1px solid rgba(108,52,131,0.2);border-radius:var(--radius);padding:1rem;margin-bottom:0.6rem;cursor:pointer;transition:all 0.2s;}
.approval-queue-card:hover{box-shadow:var(--shadow);}
.approval-queue-card.escalated{animation:escalateGlow 2s ease-in-out infinite;}
.approval-history-item{padding:0.6rem 0;border-bottom:1px solid var(--border);font-size:0.85rem;}
.approval-history-item:last-child{border-bottom:none;}

/* SETTINGS */
.settings-section{margin-bottom:1.5rem;}
.settings-title{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-light);margin-bottom:0.75rem;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:0.65rem 0;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:0.9rem;color:var(--text);}
.settings-value{font-size:0.82rem;color:var(--text-mid);}
.toggle{width:40px;height:22px;background:var(--border);border-radius:11px;cursor:pointer;position:relative;transition:background 0.2s;}
.toggle.on{background:var(--ocean);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:white;border-radius:50%;transition:left 0.2s;}
.toggle.on::after{left:21px;}

/* AGENDA */
.agenda-section{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);padding:1rem;margin-bottom:0.75rem;}
.agenda-section-title{font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.6rem;}
.agenda-item{font-size:0.88rem;color:var(--text-mid);padding:0.3rem 0;border-bottom:1px solid var(--border);display:flex;gap:0.5rem;}
.agenda-item:last-child{border-bottom:none;}

/* SYNC */
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--success);display:inline-block;margin-left:4px;}
.sync-dot.syncing{background:var(--yellow);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* TOAST */
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:0.65rem 1.25rem;border-radius:20px;font-size:0.88rem;z-index:2000;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* ARCHIVE */
.archive-search{position:relative;margin-bottom:1rem;}
.archive-search input{padding-left:2.2rem;}
.archive-search::before{content:'🔍';position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);font-size:0.85rem;}

/* DECISION BANNER */
.decision-banner{background:linear-gradient(135deg,rgba(243,156,18,0.1),rgba(230,126,34,0.08));border:1px solid rgba(243,156,18,0.3);border-radius:var(--radius);padding:0.85rem 1rem;margin-bottom:0.75rem;}
.decision-banner-title{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#935116;margin-bottom:0.4rem;}

/* TEMPLATES */
.template-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:1rem;}
.template-card{background:var(--page-bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0.75rem;cursor:pointer;transition:all 0.2s;text-align:center;}
.template-card:hover{border-color:var(--ocean);background:rgba(82,121,160,0.05);}
.template-card .t-emoji{font-size:1.4rem;display:block;margin-bottom:0.3rem;}
.template-card .t-name{font-size:0.8rem;font-weight:600;color:var(--text);}

/* FOLLOW LEVEL SELECTOR */
.follow-selector{display:flex;gap:0.4rem;flex-wrap:wrap;}
.follow-opt{padding:0.35rem 0.75rem;border-radius:20px;border:1.5px solid var(--border);font-size:0.8rem;font-weight:500;cursor:pointer;transition:all 0.2s;background:var(--card-bg);color:var(--text-mid);font-family:'DM Sans',sans-serif;}
.follow-opt.active-none{background:#f0f0f0;border-color:#ccc;color:#555;}
.follow-opt.active-notify{background:#e8f5f5;border-color:var(--tide);color:#4a8c8f;}
.follow-opt.active-approval{background:#f3eafc;border-color:var(--purple);color:#6c3483;}

@media(max-width:600px){
  .form-row,.form-row-3{grid-template-columns:1fr;}
  .kanban-board{grid-template-columns:1fr 1fr;}
}
</style>

<script>
// ============================================================
// CONFIG
// ============================================================
const BIN_ID='69f39a9136566621a80e37bd';
const BIN_KEY='$2a$10$u./u72JVwUVjuIdiEB4.d.iusC98TwDYyxS4VPqQIXNCXkx/2JOzq';
const EMAILJS_SERVICE='service_65bjny9';
const EMAILJS_TEMPLATE='template_lxtwyyp';
const EMAILJS_KEY='aTa5AWSA-QmWGO0GY';
const APP_URL='https://ccfwb.github.io/ccfwb-team/';
const CLOUDINARY_CLOUD='drqffqjcu';
const CLOUDINARY_PRESET='CCFWB-team';
const PEOPLE=['Pastor Andy','Kaitlyn','Angie'];
const PEOPLE_KEYS={'Pastor Andy':'andy','Kaitlyn':'kaitlyn','Angie':'angie'};
const PEOPLE_EMAILS={'Pastor Andy':'pastor@calvarychapelfwb.org','Kaitlyn':'hello@calvarychapelfwb.org','Angie':'admin@calvarychapelfwb.org'};
const DEFAULT_CHECKLIST_ITEMS=['Venue confirmed','Volunteers scheduled','Promotion started','Bulletin/slides ready','Sound/AV arranged','Follow-up planned'];

// ============================================================
// STATE
// ============================================================
let appData={
  tasks:[],archivedTasks:[],creativeProjects:[],winWall:[],
  briefings:{andy:[],kaitlyn:[],angie:[]},
  prayerNotes:{andy:'',kaitlyn:'',angie:''},
  notes:{andy:[],kaitlyn:[],angie:[]},
  shoutouts:[],announcements:[],events:[],
  activityFeed:[],approvalHistory:[],
  installDate:null
};
let currentTab='all';
let currentPersonalTab='tasks';
let identity=localStorage.getItem('ccfwb_identity')||null;
let darkMode=localStorage.getItem('ccfwb_dark')==='true';
let saveTimer=null;
let lastSaved=localStorage.getItem('ccfwb_lastSaved')||null;
let githubToken=localStorage.getItem('ccfwb_github_token')||'';
let editingTask=null;

// ============================================================
// INIT
// ============================================================
emailjs.init(EMAILJS_KEY);
if(darkMode) document.documentElement.setAttribute('data-theme','dark');

async function init(){
  startClock();
  if(identity){
    document.getElementById('identity-overlay').style.display='none';
    updatePersonalTabVisibility();
  }
  await loadData();
  renderCurrentTab();
  renderAnnouncements();
  scheduleHourlySave();
  checkMorningBriefing();
  updateTabBadges();
  checkEscalations();
}

function setIdentity(name){
  identity=name;
  localStorage.setItem('ccfwb_identity',name);
  document.getElementById('identity-overlay').style.display='none';
  updatePersonalTabVisibility();
  renderCurrentTab();
  renderAnnouncements();
  toast(`Welcome, ${name}! 👋`);
}

function updatePersonalTabVisibility(){
  const tab=document.getElementById('approval-tab-personal');
  if(tab) tab.style.display=identity==='Pastor Andy'?'block':'none';
}

// ============================================================
// DATA
// ============================================================
async function loadData(){
  setSyncStatus('syncing');
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':BIN_KEY}});
    const json=await r.json();
    const d=json.record;
    appData.tasks=d.tasks||[];
    appData.archivedTasks=d.archivedTasks||[];
    appData.creativeProjects=d.creativeProjects||[];
    appData.winWall=d.winWall||[];
    appData.briefings=d.briefings||{andy:[],kaitlyn:[],angie:[]};
    appData.prayerNotes=d.prayerNotes||{andy:'',kaitlyn:'',angie:''};
    appData.notes=d.notes||{andy:[],kaitlyn:[],angie:[]};
    appData.shoutouts=d.shoutouts||[];
    appData.announcements=d.announcements||[];
    appData.events=d.events||[];
    appData.activityFeed=d.activityFeed||[];
    appData.approvalHistory=d.approvalHistory||[];
    appData.installDate=d.installDate||new Date().toISOString();
    if(!d.installDate) schedSave();
    setSyncStatus('ok');
  }catch(e){
    setSyncStatus('error');
    toast('Could not load data');
  }
}

async function saveData(){
  setSyncStatus('syncing');
  // Trim activity feed to last 100
  if(appData.activityFeed.length>100) appData.activityFeed=appData.activityFeed.slice(-100);
  try{
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':BIN_KEY},
      body:JSON.stringify(appData)
    });
    lastSaved=new Date().toISOString();
    localStorage.setItem('ccfwb_lastSaved',lastSaved);
    setSyncStatus('ok');
    if(githubToken) backupToGitHub();
  }catch(e){setSyncStatus('error');}
}

function schedSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveData(),1500);}
function scheduleHourlySave(){setInterval(()=>saveData(),60*60*1000);}

async function backupToGitHub(){
  if(!githubToken) return;
  try{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(appData,null,2))));
    const getRes=await fetch('https://api.github.com/repos/CCFWB/ccfwb-team/contents/backup.json',{
      headers:{'Authorization':'token '+githubToken,'Accept':'application/vnd.github.v3+json'}
    });
    let sha='';
    if(getRes.ok){const fd=await getRes.json();sha=fd.sha;}
    await fetch('https://api.github.com/repos/CCFWB/ccfwb-team/contents/backup.json',{
      method:'PUT',
      headers:{'Authorization':'token '+githubToken,'Content-Type':'application/json'},
      body:JSON.stringify({message:'Hourly backup',content,sha,branch:'main'})
    });
  }catch(e){}
}

function exportData(){
  const blob=new Blob([JSON.stringify(appData,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`ccfwb-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  toast('Backup downloaded ✓');
}

function setSyncStatus(state){
  const dot=document.getElementById('sync-dot');
  if(!dot) return;
  dot.className='sync-dot'+(state==='syncing'?' syncing':state==='error'?' error':'');
  dot.title=state==='ok'?`Last saved: ${lastSaved?new Date(lastSaved).toLocaleTimeString():'never'}`:state==='syncing'?'Saving...':'Save error';
}

function addToFeed(text){
  appData.activityFeed.push({id:uid(),text,time:new Date().toISOString(),by:identity||'Team'});
}

// ============================================================
// ESCALATION CHECK
// ============================================================
function checkEscalations(){
  const now=Date.now();
  let changed=false;
  appData.tasks.forEach(t=>{
    if(t.status==='ready-for-review'&&t.readyForReviewAt&&!t.escalated){
      const daysPending=(now-new Date(t.readyForReviewAt))/86400000;
      if(daysPending>=3){t.escalated=true;changed=true;}
    }
  });
  if(changed) schedSave();
}

// ============================================================
// CLOCK
// ============================================================
function startClock(){
  function tick(){
    const el=document.getElementById('header-clock');
    if(el) el.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }
  tick();setInterval(tick,1000);
}

// ============================================================
// TABS
// ============================================================
function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  renderCurrentTab();
}

function renderCurrentTab(){
  const c=document.getElementById('main-content');
  if(!c) return;
  if(currentTab==='all') c.innerHTML=renderAllTasks();
  else if(currentTab==='andy') c.innerHTML=renderPersonTab('Pastor Andy');
  else if(currentTab==='kaitlyn') c.innerHTML=renderPersonTab('Kaitlyn');
  else if(currentTab==='angie') c.innerHTML=renderPersonTab('Angie');
  else if(currentTab==='creative') c.innerHTML=renderCreative();
  else if(currentTab==='events') c.innerHTML=renderEvents();
  else if(currentTab==='wins') c.innerHTML=renderWins();
  else if(currentTab==='agenda') c.innerHTML=renderAgenda();
  else if(currentTab==='archive') c.innerHTML=renderArchive();
}

function updateTabBadges(){
  const now=new Date();
  ['andy','kaitlyn','angie'].forEach(key=>{
    const name=PEOPLE.find(p=>PEOPLE_KEYS[p]===key);
    const overdue=appData.tasks.filter(t=>!t.completed&&t.assignedTo===name&&t.dueDate&&new Date(t.dueDate+'T23:59:59')<now).length;
    const tab=document.getElementById('tab-'+key);
    if(!tab) return;
    const existing=tab.querySelector('.tab-badge');
    if(existing) existing.remove();
    if(overdue>0){const b=document.createElement('span');b.className='tab-badge';b.textContent=overdue;tab.appendChild(b);}
  });
}

// ============================================================
// TASK RENDERING
// ============================================================
function taskAge(task){
  const updated=task.updatedAt||task.createdAt;
  if(!updated) return '';
  const days=Math.floor((Date.now()-new Date(updated))/86400000);
  if(days===0) return 'Updated today';
  if(days===1) return 'Updated yesterday';
  return `Updated ${days} days ago`;
}
function isStale(task){
  const updated=task.updatedAt||task.createdAt;
  if(!updated) return false;
  return Math.floor((Date.now()-new Date(updated))/86400000)>=7;
}
function isOverdue(task){
  if(!task.dueDate||task.completed) return false;
  return new Date(task.dueDate+'T23:59:59')<new Date();
}
function isBlocked(task){
  if(!task.blockedBy) return false;
  const blocker=appData.tasks.find(t=>t.id===task.blockedBy);
  return blocker&&!blocker.completed;
}

function renderTaskCard(task,showAssignee=false){
  const stale=isStale(task);
  const overdue=isOverdue(task);
  const blocked=isBlocked(task);
  let classes=`task-card p${task.priority||4}`;
  if(stale&&!task.completed) classes+=' stale glow-pulse';
  if(overdue) classes+=' overdue';
  if(task.awaitingInputFrom) classes+=' awaiting-input';
  if(task.status==='waiting-outside') classes+=' waiting-outside';
  if(blocked) classes+=' blocked';
  if(task.escalated) classes+=' escalated';

  let badges='';
  if(task.priority) badges+=`<span class="badge badge-p${task.priority}">P${task.priority}</span>`;
  if(overdue) badges+=`<span class="badge badge-overdue">⚠ Overdue</span>`;
  if(stale&&!task.completed) badges+=`<span class="badge badge-stale">🕰 Long open</span>`;
  if(task.dueDateType==='hard'&&task.dueDate) badges+=`<span class="badge badge-hard">🔴 Due ${formatDate(task.dueDate)}</span>`;
  else if(task.dueDate) badges+=`<span class="badge badge-soft">📅 ${formatDate(task.dueDate)}</span>`;
  if(task.estimatedTime) badges+=`<span class="badge badge-soft">⏱ ${escHtml(task.estimatedTime)}</span>`;
  if(task.status==='decision-pending') badges+=`<span class="badge badge-decision">⏳ Decision Pending</span>`;
  if(task.status==='waiting-outside') badges+=`<span class="badge badge-waiting">⏸ Waiting: ${escHtml(task.waitingFor||'outside')}</span>`;
  if(task.status==='ready-for-review') badges+=`<span class="badge badge-review">👁 Ready for Review${task.escalated?' 🔴':''}</span>`;
  if(task.status==='changes-requested') badges+=`<span class="badge badge-changes">↩ Changes Requested</span>`;
  if(task.awaitingInputFrom) badges+=`<span class="badge badge-input">💬 Input from ${escHtml(task.awaitingInputFrom)}</span>`;
  if(task.handoffFrom) badges+=`<span class="badge badge-handoff">↩ From ${escHtml(task.handoffFrom)}</span>`;
  if(blocked) badges+=`<span class="badge badge-blocked">🔒 Blocked</span>`;
  if(task.followLevel==='notify') badges+=`<span class="badge badge-notify">👁 Notify Andy</span>`;
  if(task.followLevel==='approval') badges+=`<span class="badge badge-review">✅ Needs Approval</span>`;
  if(showAssignee&&task.assignedTo) badges+=`<span class="badge badge-p3">👤 ${escHtml(task.assignedTo)}</span>`;
  if(task.recurring) badges+=`<span class="badge badge-p4">🔄 Recurring</span>`;

  const blockerTask=task.blockedBy?appData.tasks.find(t=>t.id===task.blockedBy):null;

  return `<div class="${classes}" onclick="openTask('${task.id}')">
    <div class="task-row">
      <div class="task-check ${task.completed?'done':''}" onclick="event.stopPropagation();${blocked?'toast(\'Task is blocked — complete the blocking task first\')':'toggleComplete(\''+task.id+'\')'}">${task.completed?'✓':''}</div>
      <div class="task-main">
        <div class="task-title ${task.completed?'done':''}">${escHtml(task.title)}</div>
        <div class="task-meta">${badges}</div>
        <div class="task-age">${taskAge(task)}</div>
        ${task.handoffFrom?`<div class="handoff-banner">↩ Handed to you by ${escHtml(task.handoffFrom)}</div>`:''}
        ${task.awaitingInputFrom?`<div class="input-banner">💬 Waiting for input from ${escHtml(task.awaitingInputFrom)}</div>`:''}
        ${blocked&&blockerTask?`<div class="blocked-banner">🔒 Blocked by: ${escHtml(blockerTask.title)}</div>`:''}
        ${task.status==='changes-requested'&&task.changesNote?`<div class="input-banner">↩ ${escHtml(task.changesNote)}</div>`:''}
      </div>
    </div>
  </div>`;
}

function formatDate(d){
  if(!d) return '';
  return new Date(d+'T00:00:00').toLocaleDateString([],{month:'short',day:'numeric'});
}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ============================================================
// ALL TASKS
// ============================================================
function renderAllTasks(){
  const tasks=appData.tasks.filter(t=>!t.completed&&!t.awaitingInputFrom);
  const awaitingInput=appData.tasks.filter(t=>t.awaitingInputFrom);
  let html=`<div class="section-header"><span class="section-title">All Active Tasks</span><button class="add-btn" onclick="openAddTask()">+ Add Task</button></div>`;
  const decisions=tasks.filter(t=>t.status==='decision-pending');
  if(decisions.length) html+=`<div class="decision-banner"><div class="decision-banner-title">⏳ Awaiting Decisions</div>${decisions.map(t=>renderTaskCard(t,true)).join('')}</div>`;
  const forReview=tasks.filter(t=>t.status==='ready-for-review');
  if(forReview.length) html+=`<div class="section-header"><span class="section-title">👁 Ready for Review</span></div>${forReview.map(t=>renderTaskCard(t,true)).join('')}`;
  if(awaitingInput.length) html+=`<div class="section-header"><span class="section-title">💬 Awaiting Input</span></div>${awaitingInput.map(t=>renderTaskCard(t,true)).join('')}`;
  const active=tasks.filter(t=>t.status!=='decision-pending'&&t.status!=='ready-for-review');
  if(active.length) html+=active.map(t=>renderTaskCard(t,true)).join('');
  else if(!decisions.length&&!forReview.length) html+=`<div class="empty-state"><div class="emoji">✅</div><p>All clear!</p></div>`;
  const recent=appData.archivedTasks.slice(-5).reverse();
  if(recent.length) html+=`<div class="section-header"><span class="section-title">✅ Recently Completed</span></div>${recent.map(t=>renderTaskCard(t,true)).join('')}`;
  return html;
}

// ============================================================
// PERSON TAB
// ============================================================
function renderPersonTab(person){
  const key=PEOPLE_KEYS[person];
  const tasks=appData.tasks.filter(t=>t.assignedTo===person&&!t.completed&&!t.awaitingInputFrom);
  const inputTasks=appData.tasks.filter(t=>t.awaitingInputFrom===person);
  const completed=appData.archivedTasks.filter(t=>t.assignedTo===person).slice(-3).reverse();
  const briefingItems=(appData.briefings[key]||[]).filter(b=>b.date===todayStr());
  const teamNotes=(appData.notes[key]||[]).filter(n=>n.privacy==='team');
  const shoutouts=(appData.shoutouts||[]).filter(s=>s.recipientKey===key).slice(-3).reverse();

  // Pastor Andy: show approval queue on his tab
  const approvalQueue=person==='Pastor Andy'?appData.tasks.filter(t=>t.status==='ready-for-review'):[];

  let html=`<div class="section-header"><span class="section-title">${person}'s Tasks</span><button class="add-btn" onclick="openAddTask('${person}')">+ Add</button></div>`;

  if(briefingItems.length){
    html+=`<div class="briefing-card"><div style="font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--ocean);margin-bottom:0.5rem;">📬 Today's Briefing</div>`;
    briefingItems.forEach(b=>{html+=`<div class="briefing-item"><div class="briefing-item-text">${escHtml(b.text)}<div class="briefing-item-meta">Added by ${escHtml(b.addedBy)}</div></div></div>`;});
    html+=`</div>`;
  }

  if(approvalQueue.length){
    html+=`<div class="section-header"><span class="section-title">⚖️ Pending Your Approval <span style="color:var(--p1)">(${approvalQueue.length})</span></span></div>`;
    approvalQueue.forEach(t=>{
      html+=`<div class="approval-queue-card ${t.escalated?'escalated':''}" onclick="openApprovalTask('${t.id}')">
        <div style="font-weight:600;font-size:0.92rem;margin-bottom:0.3rem;">${escHtml(t.title)}</div>
        <div style="font-size:0.8rem;color:var(--text-mid);">Submitted by ${escHtml(t.assignedTo||'Team')} · ${t.readyForReviewAt?daysAgo(t.readyForReviewAt)+' ago':''}${t.escalated?' 🔴 Escalated':''}</div>
      </div>`;
    });
  }

  if(inputTasks.length){html+=`<div class="section-header"><span class="section-title">💬 Needs Your Input</span></div>${inputTasks.map(t=>renderTaskCard(t)).join('')}`;}
  const decisions=tasks.filter(t=>t.status==='decision-pending');
  if(decisions.length) html+=`<div class="decision-banner"><div class="decision-banner-title">⏳ Awaiting Your Decision</div>${decisions.map(t=>renderTaskCard(t)).join('')}</div>`;
  const active=tasks.filter(t=>t.status!=='decision-pending');
  if(active.length) html+=active.map(t=>renderTaskCard(t)).join('');
  else if(!decisions.length&&!inputTasks.length&&!approvalQueue.length) html+=`<div class="empty-state"><div class="emoji">✝️</div><p>Nothing on the list!</p></div>`;
  if(completed.length) html+=`<div class="section-header"><span class="section-title">✅ Recent Completions</span></div>${completed.map(t=>renderTaskCard(t)).join('')}`;

  if(shoutouts.length){
    html+=`<div class="section-header"><span class="section-title">🌟 Recent Shoutouts</span></div>`;
    shoutouts.forEach(s=>{html+=`<div class="shoutout-card"><span class="shoutout-emoji">⭐</span><div><div class="shoutout-text">${escHtml(s.text)}</div><div class="shoutout-meta">From ${escHtml(s.from)} · ${formatDate(s.date)}</div></div></div>`;});
  }

  if(teamNotes.length){
    html+=`<div class="section-header"><span class="section-title">📝 Team Notes</span></div>`;
    teamNotes.slice(-5).reverse().forEach(n=>{
      html+=`<div class="note-card team"><div class="note-text">${escHtml(n.text)}</div><div class="note-meta"><span>${formatDate(n.date)}</span><span class="note-privacy-badge team">👥 Team</span></div></div>`;
    });
  }

  return html;
}

function renderEvents(){
  const now=new Date();
  const events=[...(appData.events||[])].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const upcoming=events.filter(e=>e.status!=='Cancelled'&&new Date(e.date)>=new Date(todayStr()));
  const past=events.filter(e=>e.status!=='Cancelled'&&new Date(e.date)<new Date(todayStr()));
  const cancelled=events.filter(e=>e.status==='Cancelled');

  let html=`<div class="section-header"><span class="section-title">📅 Events</span><button class="add-btn" onclick="openAddEvent()">+ New Event</button></div>`;

  if(upcoming.length){
    html+=`<div class="section-header"><span class="section-title" style="font-size:0.85rem;">Upcoming</span></div>`;
    upcoming.forEach(e=>{ html+=renderEventCard(e); });
  }
  if(past.length){
    html+=`<div class="section-header"><span class="section-title" style="font-size:0.85rem;">Past</span></div>`;
    past.slice(-5).reverse().forEach(e=>{ html+=renderEventCard(e); });
  }
  if(!upcoming.length&&!past.length) html+=`<div class="empty-state"><div class="emoji">📅</div><p>No events yet — add your first one!</p></div>`;
  return html;
}

function renderEventCard(e){
  const daysUntil=Math.ceil((new Date(e.date)-new Date(todayStr()))/86400000);
  const isSoon=daysUntil>=0&&daysUntil<=3;
  const isThisWeek=daysUntil>3&&daysUntil<=7;
  const checklist=e.checklist||[];
  const needed=checklist.filter(c=>c.needed!==false);
  const done=needed.filter(c=>c.done);
  let classes=`event-card${isSoon?' soon':isThisWeek?' this-week':''}`;
  let countdown='';
  if(daysUntil===0) countdown='<span class="event-countdown soon">Today!</span>';
  else if(daysUntil===1) countdown='<span class="event-countdown soon">Tomorrow</span>';
  else if(daysUntil>0) countdown=`<span class="event-countdown ${isSoon?'soon':''}">in ${daysUntil} days</span>`;
  else countdown=`<span style="font-size:0.75rem;color:var(--text-light)">${Math.abs(daysUntil)} days ago</span>`;

  return `<div class="${classes}" onclick="openEvent('${e.id}')">
    <div class="event-title">${escHtml(e.name)}</div>
    <div class="event-meta-row">
      <span class="badge badge-p3">${escHtml(e.eventType||'')}</span>
      <span class="badge badge-soft">📅 ${formatDate(e.date)}${e.timeStart?' '+e.timeStart:''}</span>
      ${e.location?`<span class="badge badge-soft">📍 ${escHtml(e.location)}</span>`:''}
      ${countdown}
    </div>
    <div class="event-meta-row">
      <span class="event-progress">✓ ${done.length}/${needed.length} checklist items</span>
      ${e.pointPerson?`<span class="badge badge-p4">👤 ${escHtml(e.pointPerson)}</span>`:''}
      ${e.subsplash?`<span class="badge badge-approved">📲 On Subsplash</span>`:`<span class="badge badge-soft">📲 Not on Subsplash</span>`}
    </div>
  </div>`;
}

    <div style="display:flex;gap:1rem;flex-wrap:wrap;font-size:0.85rem;color:var(--text-mid);margin-bottom:0.75rem;">
      ${e.location?`<span>📍 ${escHtml(e.location)}</span>`:''}
      ${e.pointPerson?`<span>👤 ${escHtml(e.pointPerson)}</span>`:''}

      <button class="btn-primary" onclick="updateEventStatus('${id}')">Update Status</button>
      <button class="btn-danger" onclick="deleteEvent('${id}')">Delete</button>
    </div>
  `,true);
}

function toggleEventChecklist(eventId,itemId){
  const e=appData.events.find(ev=>ev.id===eventId);
  if(!e) return;
  const item=e.checklist.find(c=>c.id===itemId);
  if(item) item.done=!item.done;
  schedSave();
  openEvent(eventId);
}

function toggleChecklistItemNeeded(eventId,itemId){
  const e=appData.events.find(ev=>ev.id===eventId);
  if(!e) return;
  const item=e.checklist.find(c=>c.id===itemId);
  if(item) item.needed=item.needed===false?true:false;
  schedSave();
  openEvent(eventId);
}

function updateEventStatus(id){
  const e=appData.events.find(ev=>ev.id===id);
  if(!e) return;
  e.status=document.getElementById('ev-status-sel').value;
  closeModal();schedSave();renderCurrentTab();toast('Event updated ✓');

function deleteEvent(id){
  if(!confirm('Delete this event?')) return;
  appData.events=appData.events.filter(e=>e.id!==id);
  closeModal();schedSave();renderCurrentTab();toast('Event deleted');

function renderWins(){
  const now=new Date();
  const startOfWeek=new Date(now);startOfWeek.setDate(now.getDate()-now.getDay());startOfWeek.setHours(0,0,0,0);
  const startOfLastWeek=new Date(startOfWeek);startOfLastWeek.setDate(startOfWeek.getDate()-7);

  const thisWeek=appData.archivedTasks.filter(t=>t.completedAt&&new Date(t.completedAt)>=startOfWeek).length;
  const lastWeek=appData.archivedTasks.filter(t=>t.completedAt&&new Date(t.completedAt)>=startOfLastWeek&&new Date(t.completedAt)<startOfWeek).length;
  const diff=thisWeek-lastWeek;

  let html=`<div class="streak-card">
    <div style="font-family:'Lora',serif;font-size:1rem;font-weight:600;">🏆 Team Completion Streak</div>
    <div class="streak-nums">
      <div><div class="streak-num">${thisWeek}</div><div class="streak-label">This Week</div></div>
      <div><div class="streak-num">${lastWeek}</div><div class="streak-label">Last Week</div></div>
      <div><div class="streak-num">${diff>=0?'+':''}${diff}</div><div class="streak-label">${diff>0?'📈 Trending up':diff<0?'📉 Keep going':'➡ Same pace'}</div></div>
    </div>
  </div>`;

  html+=`<div class="section-header"><span class="section-title">🏆 Win Wall</span><button class="add-btn secondary" onclick="openAddShoutout()">⭐ Give Shoutout</button></div>`;
  if(!appData.winWall.length) html+=`<div class="empty-state"><div class="emoji">🙏</div><p>Completed tasks appear here as wins!</p></div>`;
  else appData.winWall.slice().reverse().slice(0,30).forEach(w=>{
    html+=`<div class="win-card"><span class="win-emoji">🎉</span><div><div class="win-text">${escHtml(w.title)}</div><div class="win-meta">${escHtml(w.person||'')} · ${w.date?new Date(w.date).toLocaleDateString():''}</div></div></div>`;
  });

  if(appData.shoutouts&&appData.shoutouts.length){
    html+=`<div class="section-header"><span class="section-title">⭐ Shoutouts</span></div>`;
    appData.shoutouts.slice().reverse().slice(0,20).forEach(s=>{
      html+=`<div class="shoutout-card"><span class="shoutout-emoji">⭐</span><div><div class="shoutout-text">${escHtml(s.text)}</div><div class="shoutout-meta">From ${escHtml(s.from)} → ${escHtml(s.recipient)} · ${formatDate(s.date)}</div></div></div>`;
    });
  }
  return html;
}

// ============================================================
// AGENDA
// ============================================================
function renderAgenda(){
  const now=new Date();
  const todayEnd=new Date();todayEnd.setHours(23,59,59,999);
  const weekEnd=new Date();weekEnd.setDate(weekEnd.getDate()+7);
  const overdue=appData.tasks.filter(t=>!t.completed&&t.dueDate&&new Date(t.dueDate+'T23:59:59')<now);
  const dueToday=appData.tasks.filter(t=>!t.completed&&t.dueDate&&new Date(t.dueDate+'T00:00:00')<=todayEnd&&new Date(t.dueDate+'T23:59:59')>=now);
  const thisWeek=appData.tasks.filter(t=>!t.completed&&t.dueDate&&new Date(t.dueDate)>todayEnd&&new Date(t.dueDate)<=weekEnd);
  const decisions=appData.tasks.filter(t=>!t.completed&&t.status==='decision-pending');
  const stale=appData.tasks.filter(t=>!t.completed&&isStale(t));
  const forReview=appData.tasks.filter(t=>t.status==='ready-for-review');

  const section=(title,items,emoji)=>{
    if(!items.length) return '';
    return `<div class="agenda-section"><div class="agenda-section-title" style="color:var(--ocean)">${emoji} ${title} (${items.length})</div>${items.map(t=>`<div class="agenda-item"><span style="color:var(--ocean)">•</span><span>${escHtml(t.title)} <span style="color:var(--text-light);font-size:0.8rem;">— ${escHtml(t.assignedTo||'')}</span></span></div>`).join('')}</div>`;
  };

  let html=`<div class="section-header"><span class="section-title">📋 Meeting Agenda</span></div>`;
  html+=section('Overdue',overdue,'🔴');
  html+=section('Due Today',dueToday,'📅');
  html+=section('This Week',thisWeek,'📆');
  html+=section('Awaiting Decisions',decisions,'⏳');
  html+=section('Pending Approval',forReview,'⚖️');
  html+=section('Long Open (7+ days)',stale,'🕰');
  if(!overdue.length&&!dueToday.length&&!thisWeek.length&&!decisions.length&&!stale.length&&!forReview.length)
    html+=`<div class="empty-state"><div class="emoji">✝️</div><p>Nothing pressing — great week ahead!</p></div>`;
  return html;
}

// ARCHIVE
// ============================================================
function renderArchive(query=''){
  let items=appData.archivedTasks;
  if(query) items=items.filter(t=>(t.title||'').toLowerCase().includes(query.toLowerCase())||(t.archiveNote||'').toLowerCase().includes(query.toLowerCase()));
  // Also search team notes
  let noteResults=[];
  if(query){
    PEOPLE.forEach(p=>{
      const key=PEOPLE_KEYS[p];
      const visible=(appData.notes[key]||[]).filter(n=>n.privacy==='team'||(identity&&PEOPLE_KEYS[identity]===key));
      noteResults=[...noteResults,...visible.filter(n=>(n.text||'').toLowerCase().includes(query.toLowerCase())).map(n=>({...n,_person:p}))];
    });
  }

  let html=`<div class="section-header"><span class="section-title">📁 Archive</span></div>
  <div class="archive-search"><input type="text" placeholder="Search tasks and notes..." value="${escHtml(query)}" oninput="renderArchiveSearch(this.value)"/></div>`;

  if(noteResults.length){
    html+=`<div class="section-header"><span class="section-title">📝 Matching Notes</span></div>`;
    noteResults.forEach(n=>{
      html+=`<div class="note-card ${n.privacy}"><div class="note-text">${escHtml(n.text)}</div><div class="note-meta"><span>${n._person}</span><span>${formatDate(n.date)}</span><span class="note-privacy-badge ${n.privacy}">${n.privacy==='private'?'🔒 Private':'👥 Team'}</span></div></div>`;
    });
  }

  if(!items.length&&!noteResults.length){html+=`<div class="empty-state"><div class="emoji">📭</div><p>Nothing found.</p></div>`;return html;}
  items.slice().reverse().slice(0,50).forEach(t=>{
    html+=`<div class="task-card p4"><div class="task-row">
      <div class="task-check done">✓</div>
      <div class="task-main">
        <div class="task-title done">${escHtml(t.title)}</div>
        <div class="task-meta"><span class="badge badge-soft">${escHtml(t.assignedTo||'')}</span><span class="badge badge-soft">${t.completedAt?new Date(t.completedAt).toLocaleDateString():''}</span></div>
        ${t.archiveNote?`<div style="font-size:0.82rem;color:var(--text-mid);margin-top:0.4rem;font-style:italic;">"${escHtml(t.archiveNote)}"</div>`:''}
      </div>
    </div></div>`;
  });
  return html;
}

  const t=templates[type];if(!t) return;
  document.getElementById('task-title').value=t.title;
  document.getElementById('task-priority').value=t.priority;
  document.getElementById('task-notes').value=t.notes;
}

function saveTask(){
  const title=document.getElementById('task-title').value.trim();
  if(!title){toast('Please enter a task title');return;}
  const status=document.getElementById('task-status').value;
  const blockedBy=document.getElementById('task-blocked-by').value;
  const followLevel=window._followLevel||'none';

  // Check for circular dependency
  if(blockedBy&&editingTask&&blockedBy===editingTask.id){toast('A task cannot block itself');return;}

  const task={
    id:editingTask?editingTask.id:uid(),
    title,
    assignedTo:document.getElementById('task-person').value,
    priority:parseInt(document.getElementById('task-priority').value)||3,
    dueDate:document.getElementById('task-due').value,
    dueDateType:document.getElementById('task-due-type').value,
    estimatedTime:document.getElementById('task-est-time').value,
    status,
    waitingFor:status==='waiting-outside'?document.getElementById('task-waiting-for').value:'',
    blockedBy:blockedBy||null,
    followLevel,
    readyForReviewAt: status==='ready-for-review'
      ? (editingTask&&editingTask.readyForReviewAt ? editingTask.readyForReviewAt : new Date().toISOString())
      : null,
    notes:document.getElementById('task-notes').value,
    recurring:document.getElementById('task-recurring').checked,
    completed:false,
    createdAt:editingTask?editingTask.createdAt:new Date().toISOString(),
    updatedAt:new Date().toISOString()
  };

  if(editingTask){
    const idx=appData.tasks.findIndex(t=>t.id===editingTask.id);
    if(idx!==-1) appData.tasks[idx]={
      ...editingTask,...task,
      awaitingInputFrom:editingTask.awaitingInputFrom||null,
      inputRequestFrom:editingTask.inputRequestFrom||null,
      handoffFrom:editingTask.handoffFrom||null,
      escalated:editingTask.escalated||false
    };
  } else {
    appData.tasks.push(task);
    addToFeed(`📝 ${identity||'Team'} added task: ${title}`);
  }
  closeModal();schedSave();renderCurrentTab();updateTabBadges();
  toast(editingTask?'Task updated ✓':'Task added ✓');
  editingTask=null;
}

// ============================================================
// TASK DETAIL
// ============================================================
function openTask(id){
  const task=appData.tasks.find(t=>t.id===id);
  if(!task) return;
  editingTask=task;
  const canInputRespond=task.awaitingInputFrom===identity;
  const canHandoff=!task.awaitingInputFrom&&!task.completed;
  const blocked=isBlocked(task);
  const blockerTask=task.blockedBy?appData.tasks.find(t=>t.id===task.blockedBy):null;

  showModal(`
    <div class="modal-header"><span class="modal-title">${escHtml(task.title)}</span><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="task-meta" style="margin-bottom:1rem;gap:0.4rem;display:flex;flex-wrap:wrap;">
      <span class="badge badge-p${task.priority}">P${task.priority}</span>
      ${task.assignedTo?`<span class="badge badge-p3">👤 ${escHtml(task.assignedTo)}</span>`:''}
      ${task.dueDate?`<span class="badge ${task.dueDateType==='hard'?'badge-hard':'badge-soft'}">📅 ${formatDate(task.dueDate)} (${task.dueDateType})</span>`:''}
      ${task.estimatedTime?`<span class="badge badge-soft">⏱ ${escHtml(task.estimatedTime)}</span>`:''}
      ${task.followLevel==='notify'?'<span class="badge badge-notify">👁 Notify Andy</span>':''}
      ${task.followLevel==='approval'?'<span class="badge badge-review">✅ Needs Approval</span>':''}
      ${task.status?`<span class="badge badge-decision">${escHtml(task.status)}</span>`:''}
      ${blocked?`<span class="badge badge-blocked">🔒 Blocked by: ${escHtml(blockerTask?blockerTask.title:'another task')}</span>`:''}
    </div>
    ${task.notes?`<div style="font-size:0.9rem;color:var(--text-mid);margin-bottom:1rem;line-height:1.6;background:var(--page-bg);padding:0.75rem;border-radius:var(--radius-sm);">${escHtml(task.notes)}</div>`:''}
    ${task.handoffFrom?`<div class="handoff-banner">↩ Handed to you by ${escHtml(task.handoffFrom)}</div>`:''}
    ${task.awaitingInputFrom&&!canInputRespond?`<div class="input-banner">💬 Waiting for input from ${escHtml(task.awaitingInputFrom)}</div>`:''}
    ${task.status==='changes-requested'&&task.changesNote?`<div class="input-banner">↩ ${escHtml(task.changesNote)}</div>`:''}
    ${canInputRespond?`<div style="border-top:1px solid var(--border);padding-top:1rem;margin-top:0.5rem;">
      <div style="font-size:0.85rem;font-weight:600;color:#7d3c98;margin-bottom:0.5rem;">💬 Your input has been requested</div>
      <div class="form-group"><label>Your Input</label><textarea id="input-response" style="min-height:100px;"></textarea></div>
      <button class="btn-primary" style="background:#7d3c98;" onclick="submitInputResponse('${task.id}')">📤 Send Back with Input</button>
    </div>`:''}
    <div style="border-top:1px solid var(--border);padding-top:1rem;margin-top:1rem;display:flex;flex-direction:column;gap:0.5rem;">
      ${canHandoff&&task.status!=='ready-for-review'?`<div class="btn-row">
        <button class="btn-secondary" onclick="closeModal();openHandoffModal('${task.id}')">↩ Hand Off</button>
        <button class="btn-secondary" onclick="closeModal();openInputRequestModal('${task.id}')">💬 Request Input</button>
      </div>`:''}
      ${task.status==='decision-pending'?`<button class="btn-secondary" onclick="resolveDecision('${task.id}')">✅ Resolve Decision</button>`:''}
      ${canHandoff&&task.status!=='ready-for-review'&&(task.followLevel==='approval'||task.status==='changes-requested')?`<button class="btn-secondary" onclick="submitForReview('${task.id}')">👁 Submit for Review</button>`:''}
      <div class="btn-row">
        <button class="btn-primary" onclick="closeModal();openEditTask('${task.id}')">✏️ Edit</button>
        <button class="btn-danger" onclick="deleteTask('${task.id}')">🗑 Delete</button>
      </div>
    </div>
  `,true);
}

function submitForReview(id){
  const task=appData.tasks.find(t=>t.id===id);
  if(!task) return;
  task.status='ready-for-review';
  task.readyForReviewAt=new Date().toISOString();
  task.escalated=false;
  task.updatedAt=new Date().toISOString();
  addToFeed(`👁 ${escHtml(task.title)} submitted for review by ${identity||'Team'}`);
  closeModal();schedSave();renderCurrentTab();updateTabBadges();
  toast('Submitted for Pastor Andy\'s review ✓');
}

function openEditTask(id){
  const task=appData.tasks.find(t=>t.id===id);
  if(!task) return;
  editingTask=task;
  openAddTask(task.assignedTo);
  setTimeout(()=>{
    document.getElementById('task-title').value=task.title||'';
    document.getElementById('task-person').value=task.assignedTo||'';
    document.getElementById('task-priority').value=task.priority||3;
    document.getElementById('task-due').value=task.dueDate||'';
    document.getElementById('task-due-type').value=task.dueDateType||'soft';
    document.getElementById('task-est-time').value=task.estimatedTime||'';
    document.getElementById('task-status').value=task.status||'';
    document.getElementById('task-waiting-for').value=task.waitingFor||'';
    document.getElementById('task-blocked-by').value=task.blockedBy||'';
    document.getElementById('task-notes').value=task.notes||'';
    document.getElementById('task-recurring').checked=!!task.recurring;
    if(task.status==='waiting-outside') document.getElementById('waiting-for-group').style.display='block';
    setFollowLevel(task.followLevel||'none');
    document.querySelector('.modal .btn-primary').textContent='Save Changes';
    document.querySelector('.modal-title').textContent='Edit Task';
  },50);
}

function deleteTask(id){
  if(!confirm('Delete this task?')) return;
  // Clear blockedBy on any tasks pointing here
  appData.tasks.forEach(t=>{if(t.blockedBy===id) t.blockedBy=null;});
  appData.tasks=appData.tasks.filter(t=>t.id!==id);
  closeModal();schedSave();renderCurrentTab();updateTabBadges();toast('Task deleted');
}

// ============================================================
// TOGGLE COMPLETE
// ============================================================
function toggleComplete(id){
  const task=appData.tasks.find(t=>t.id===id);
  if(!task) return;
  if(isBlocked(task)){toast('Task is blocked — complete the blocking task first');return;}
  if(!task.completed){
    // Optional completion note
    const note=prompt('Add a completion note (optional — press Cancel to skip):');
    // note is null if cancelled, empty string if OK with no input — both are fine
    task.completed=true;
    task.completedAt=new Date().toISOString();
    task.updatedAt=new Date().toISOString();
    appData.winWall.push({id:uid(),title:task.title,person:task.assignedTo||'Team',date:new Date().toISOString()});
    appData.archivedTasks.push({...task,archiveNote:note||''});
    addToFeed(`✅ ${escHtml(task.title)} completed by ${escHtml(task.assignedTo||'Team')}`);
    // Notify Andy if followLevel is notify
    if(task.followLevel==='notify'){
      if(!appData.briefings.andy) appData.briefings.andy=[];
      appData.briefings.andy.push({id:uid(),text:`✅ Completed: ${task.title} (by ${task.assignedTo||'Team'})`,addedBy:'System',date:todayStr(),createdAt:new Date().toISOString()});
    }
    if(task.recurring&&task.dueDate){
      const next={...task,id:uid(),completed:false,completedAt:null,updatedAt:new Date().toISOString(),createdAt:new Date().toISOString()};
      const nd=new Date(task.dueDate+'T00:00:00');nd.setDate(nd.getDate()+7);
      next.dueDate=nd.toISOString().split('T')[0];
      appData.tasks.push(next);
    }
    appData.tasks=appData.tasks.filter(t=>t.id!==id);
  } else {
    task.completed=false;task.completedAt=null;task.updatedAt=new Date().toISOString();
  }
  schedSave();renderCurrentTab();updateTabBadges();
}

// ============================================================
// HANDOFF
// ============================================================
function openHandoffModal(id){
  const task=appData.tasks.find(t=>t.id===id);
  if(!task) return;
  showModal(`
    <div class="modal-header"><span class="modal-title">Hand Off Task</span><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div style="font-size:0.88rem;color:var(--text-mid);margin-bottom:1rem;">"${escHtml(task.title)}"</div>
    <div class="form-group"><label>Hand off to</label>
      <select id="handoff-to">${PEOPLE.filter(p=>p!==task.assignedTo).map(p=>`<option value="${p}">${p}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Handoff Note</label><textarea id="handoff-note" placeholder="Why are you handing this off?" style="min-height:80px;"></textarea></div>
    <button class="btn-primary" onclick="saveHandoff('${id}')">Hand Off Task</button>
  `);
}

function saveHandoff(id){
  const task=appData.tasks.find(t=>t.id===id);
  if(!task) return;
  const to=document.getElementById('handoff-to').value;
  const note=document.getElementById('handoff-note').value;
  task.handoffFrom=task.assignedTo||identity;
  task.assignedTo=to;
  task.notes=(task.notes?task.notes+'\n\n':'')+`Handoff note: ${note}`;
  task.updatedAt=new Date().toISOString();
  addToFeed(`↩ ${escHtml(task.title)} handed off to ${to}`);
  closeModal();schedSave();renderCurrentTab();updateTabBadges();toast(`Task handed off to ${to} ✓`);
}

// ============================================================
// INPUT REQUEST
// ============================================================
function openInputRequestModal(id){
  const task=appData.tasks.find(t=>t.id===id);
  if(!task) return;
  showModal(`
    <div class="modal-header"><span class="modal-title">Request Input</span><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div style="font-size:0.85rem;color:var(--text-mid);background:rgba(155,89,182,0.08);border-radius:var(--radius-sm);padding:0.65rem;margin-bottom:1rem;">
      The task leaves your list and returns automatically once they submit their input.
    </div>
    <div class="form-group"><label>Request input from</label>
      <select id="input-from">${PEOPLE.filter(p=>p!==task.assignedTo).map(p=>`<option value="${p}">${p}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>What do you need?</label><textarea id="input-request-note" style="min-height:80px;"></textarea></div>
    <button class="btn-primary" onclick="saveInputRequest('${id}')">Send Input Request</button>
  `);
}

function saveInputRequest(id){
  const task=appData.tasks.find(t=>t.id===id);
  if(!task) return;
  const from=document.getElementById('input-from').value;
  const note=document.getElementById('input-request-note').value;
  task.inputRequestFrom=task.assignedTo||identity;
  task.awaitingInputFrom=from;
  task.inputRequestNote=note;
  task.notes=(task.notes?task.notes+'\n\n':'')+`Input requested: ${note}`;
  task.updatedAt=new Date().toISOString();
  closeModal();schedSave();renderCurrentTab();updateTabBadges();toast(`Input requested from ${from} ✓`);
}

function submitInputResponse(id){
  const task=appData.tasks.find(t=>t.id===id);
  if(!task) return;
  const response=document.getElementById('input-response').value.trim();
  if(!response){toast('Please enter your input before sending');return;}
  const returnTo=task.inputRequestFrom;
  task.notes=(task.notes?task.notes+'\n\n':'')+`Input from ${task.awaitingInputFrom}: ${response}`;
  task.assignedTo=returnTo;
  task.awaitingInputFrom=null;task.inputRequestFrom=null;task.inputRequestNote=null;
  task.updatedAt=new Date().toISOString();
  addToFeed(`💬 Input submitted on: ${escHtml(task.title)}`);
  closeModal();schedSave();renderCurrentTab();updateTabBadges();toast(`Input sent back to ${returnTo} ✓`);
}

function resolveDecision(id){
  const note=prompt('Enter resolution note:');
  if(note===null) return;
  const task=appData.tasks.find(t=>t.id===id);
  if(!task) return;
  task.status='';
  task.notes=(task.notes?task.notes+'\n\n':'')+`Decision resolved: ${note}`;
  task.updatedAt=new Date().toISOString();
  closeModal();schedSave();renderCurrentTab();toast('Decision resolved ✓');
}

// ============================================================
// MORNING EMAIL
// ============================================================
function checkMorningBriefing(){
  const hour=new Date().getHours();
  const todayKey=`ccfwb_email_sent_${todayStr()}`;
  if(hour>=7&&hour<8&&!localStorage.getItem(todayKey)){
    sendMorningEmails();
    localStorage.setItem(todayKey,'1');
  }
}

function isFirstWeek(){
  if(!appData.installDate) return true;
  return (Date.now()-new Date(appData.installDate))/86400000<=8;
}

async function sendMorningEmails(){
  const testNote=isFirstWeek()?'\n\n---\n📱 NOTE: This email is a test function of the in-house Calvary Chapel FWB Church management app. If you notice any glitches or have suggestions, please let Angie know (admin@calvarychapelfwb.org).':'';
  const now=new Date();
  const weekEnd=new Date();weekEnd.setDate(weekEnd.getDate()+14);

  const dateLabel=new Date().toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});
  for(const person of PEOPLE){
    const key=PEOPLE_KEYS[person];
    const email=PEOPLE_EMAILS[person];
    const tasks=appData.tasks.filter(t=>t.assignedTo===person&&!t.completed);
    const briefing=(appData.briefings[key]||[]).filter(b=>b.date===todayStr());
    const overdue=tasks.filter(t=>isOverdue(t));
    const decisions=tasks.filter(t=>t.status==='decision-pending');
    const inputNeeded=appData.tasks.filter(t=>t.awaitingInputFrom===person);
    const dueThisWeek=tasks.filter(t=>t.dueDate&&new Date(t.dueDate)<=weekEnd&&!isOverdue(t));
    const upcomingEvents=(appData.events||[]).filter(e=>{
      const d=new Date(e.date);
      const days=Math.ceil((d-new Date(todayStr()))/86400000);
      return days>=0&&days<=14&&e.status!=='Cancelled';
    });
    const approvalQueue=person==='Pastor Andy'?appData.tasks.filter(t=>t.status==='ready-for-review'):[];

    let body=`Good morning, ${person}! ☀️\n\nHere's your briefing for ${dateLabel}:\n\n`;
    if(briefing.length){body+=`📬 BRIEFING ITEMS:\n`;briefing.forEach(b=>{body+=`  • ${b.text}\n`;});body+='\n';}
    if(overdue.length){body+=`⚠️ OVERDUE (${overdue.length}):\n`;overdue.forEach(t=>{body+=`  • ${t.title}\n`;});body+='\n';}
    if(approvalQueue.length){body+=`⚖️ PENDING YOUR APPROVAL (${approvalQueue.length}):\n`;approvalQueue.forEach(t=>{body+=`  • ${t.title}${t.escalated?' 🔴 ESCALATED':''}\n`;});body+='\n';}
    if(decisions.length){body+=`⏳ AWAITING YOUR DECISION (${decisions.length}):\n`;decisions.forEach(t=>{body+=`  • ${t.title}\n`;});body+='\n';}
    if(inputNeeded.length){body+=`💬 INPUT REQUESTED FROM YOU (${inputNeeded.length}):\n`;inputNeeded.forEach(t=>{body+=`  • ${t.title}\n`;});body+='\n';}
    if(upcomingEvents.length){
      body+=`📅 UPCOMING EVENTS (next 14 days):\n`;
      upcomingEvents.sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(e=>{
        const d=Math.ceil((new Date(e.date)-new Date(todayStr()))/86400000);
        body+=`  • ${e.name} — ${formatDate(e.date)}${d===0?' (Today!)':d===1?' (Tomorrow)':` (in ${d} days)`}\n`;
      });
      body+='\n';
    }
    if(dueThisWeek.length){body+=`📋 DUE THIS WEEK:\n`;dueThisWeek.forEach(t=>{body+=`  • ${t.title} — ${formatDate(t.dueDate)}${t.dueDateType==='hard'?' 🔴':''}\n`;});body+='\n';}
    if(tasks.length){body+=`📋 ALL ACTIVE TASKS (${tasks.length}):\n`;tasks.slice(0,10).forEach(t=>{body+=`  • ${t.title}\n`;});if(tasks.length>10) body+=`  ...and ${tasks.length-10} more\n`;body+='\n';}
    if(!tasks.length&&!briefing.length) body+=`✝️ All clear today!\n\n`;
    body+=`🔗 Open the app: ${APP_URL}${testNote}`;

    try{
      await emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{
        to_name:person,to_email:email,
        subject:`CCFWB Morning Briefing — ${dateLabel}`,
        message:body
      });
    }catch(e){console.log('Email error',person,e);}
  }
}

      <div class="settings-row"><span class="settings-label">Install Date</span><span class="settings-value">${appData.installDate?new Date(appData.installDate).toLocaleDateString():'-'}</span></div>

function saveGithubToken(){githubToken=document.getElementById('gh-token-input').value.trim();localStorage.setItem('ccfwb_github_token',githubToken);toast('GitHub token saved ✓');}

// ============================================================
// MODAL HELPERS
// ============================================================
function showModal(html,center=false){
  document.getElementById('modal-container').innerHTML=`<div class="modal-backdrop ${center?'center':''}" onclick="handleBackdropClick(event)"><div class="modal">${html}</div></div>`;
}
function closeModal(){document.getElementById('modal-container').innerHTML='';editingTask=null;}
function handleBackdropClick(e){if(e.target.classList.contains('modal-backdrop')) closeModal();}

// ============================================================
// TOAST
// ============================================================
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ============================================================
// UTILS
// ============================================================
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6);}
function todayStr(){return new Date().toISOString().split('T')[0];}
function daysAgo(dateStr){
  const d=Math.floor((Date.now()-new Date(dateStr))/86400000);
  if(d===0) return 'today';if(d===1) return '1 day';return `${d} days`;
}

init();
