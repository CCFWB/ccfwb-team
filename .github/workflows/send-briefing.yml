name: Morning Briefing Email

on:
  schedule:
    # 7:00 AM US Central Standard Time = 13:00 UTC
    # 7:00 AM US Central Daylight Time = 12:00 UTC
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
    # Keep-alive every Sunday to prevent GitHub pausing the schedule
    - cron: '0 10 * * 0'
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Send Morning Briefing Emails
        run: |
          node << 'EOF'
          const https = require('https');

          const BIN_ID = '69f39a9136566621a80e37bd';
          const BIN_KEY = '$2a$10$u./u72JVwUVjuIdiEB4.d.iusC98TwDYyxS4VPqQIXNCXkx/2JOzq';
          const EMAILJS_SERVICE = 'service_65bjny9';
          const EMAILJS_TEMPLATE = 'template_lxtwyyp';
          const EMAILJS_KEY = 'aTa5AWSA-QmWGO0GY';
          const APP_URL = 'https://ccfwb.github.io/ccfwb-team/';

          const PEOPLE = {
            'Pastor Andy': { key: 'andy', email: 'pastor@calvarychapelfwb.org' },
            'Kaitlyn':     { key: 'kaitlyn', email: 'hello@calvarychapelfwb.org' },
            'Angie':       { key: 'angie', email: 'admin@calvarychapelfwb.org' }
          };

          function request(options, body) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => { try { resolve(JSON.parse(data)); } catch { resolve(data); } });
              });
              req.on('error', reject);
              if (body) req.write(JSON.stringify(body));
              req.end();
            });
          }

          function todayStr() { return new Date().toISOString().split('T')[0]; }

          function formatDate(d) {
            if (!d) return '';
            return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          }

          function isOverdue(task) {
            if (!task.dueDate || task.completed) return false;
            return new Date(task.dueDate + 'T23:59:59') < new Date();
          }

          function isFirstWeek(installDate) {
            if (!installDate) return true;
            return (Date.now() - new Date(installDate)) / 86400000 <= 8;
          }

          function getStreak(archivedTasks) {
            const now = new Date();
            const startThis = new Date(now);
            startThis.setDate(now.getDate() - now.getDay());
            startThis.setHours(0,0,0,0);
            const startLast = new Date(startThis);
            startLast.setDate(startThis.getDate() - 7);
            const thisWeek = (archivedTasks||[]).filter(t => t.completedAt && new Date(t.completedAt) >= startThis).length;
            const lastWeek = (archivedTasks||[]).filter(t => t.completedAt && new Date(t.completedAt) >= startLast && new Date(t.completedAt) < startThis).length;
            return { thisWeek, lastWeek };
          }

          async function run() {
            const utcHour = new Date().getUTCHours();
            // Skip keep-alive run (10 UTC Sunday) — only send at 12 or 13 UTC
            if (utcHour === 10) { console.log('Keep-alive ping only — no emails sent'); return; }

            console.log('Fetching app data...');
            const data = await request({
              hostname: 'api.jsonbin.io',
              path: `/v3/b/${BIN_ID}/latest`,
              method: 'GET',
              headers: { 'X-Master-Key': BIN_KEY }
            });

            const appData = data.record;
            if (!appData) { console.log('No data found'); process.exit(1); }

            const testNote = isFirstWeek(appData.installDate)
              ? '\n\n---\n📱 NOTE: This email is a test function of the in-house Calvary Chapel FWB Church management app. If you notice any glitches or have suggestions, please let Angie know at admin@calvarychapelfwb.org.'
              : '';

            const today = todayStr();
            const weekEnd = new Date(); weekEnd.setDate(weekEnd.getDate() + 7);
            const fourteenDays = new Date(); fourteenDays.setDate(fourteenDays.getDate() + 14);

            const streak = getStreak(appData.archivedTasks);
            const streakDiff = streak.thisWeek - streak.lastWeek;
            const streakLine = `📊 TEAM STREAK: ${streak.thisWeek} tasks this week · ${streak.lastWeek} last week · ${streakDiff > 0 ? '📈 Up '+streakDiff : streakDiff < 0 ? '📉 Down '+Math.abs(streakDiff) : '➡ Same pace'}\n\n`;

            const upcomingEvents = (appData.events||[]).filter(e => {
              if (!e.date || e.status === 'Cancelled') return false;
              const d = Math.ceil((new Date(e.date) - new Date(today)) / 86400000);
              return d >= 0 && d <= 14;
            }).sort((a,b) => new Date(a.date) - new Date(b.date));

            const dateLabel = new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});

            for (const [personName, info] of Object.entries(PEOPLE)) {
              const tasks = (appData.tasks||[]).filter(t => t.assignedTo === personName && !t.completed);
              const briefing = ((appData.briefings||{})[info.key]||[]).filter(b => b.date === today);
              const overdue = tasks.filter(t => isOverdue(t));
              const decisions = tasks.filter(t => t.status === 'decision-pending');
              const inputNeeded = (appData.tasks||[]).filter(t => t.awaitingInputFrom === personName);
              const dueThisWeek = tasks.filter(t => t.dueDate && new Date(t.dueDate) <= weekEnd && !isOverdue(t));
              const approvalQueue = personName === 'Pastor Andy'
                ? (appData.tasks||[]).filter(t => t.status === 'ready-for-review')
                : [];

              let body = `Good morning, ${personName}! ☀️\n\nHere's your briefing for ${dateLabel}:\n\n`;

              if (briefing.length) {
                body += `📬 BRIEFING ITEMS:\n`;
                briefing.forEach(b => { body += `  • ${b.text}\n`; });
                body += '\n';
              }

              body += streakLine;

              if (overdue.length) {
                body += `⚠️ OVERDUE (${overdue.length}):\n`;
                overdue.forEach(t => { body += `  • ${t.title}\n`; });
                body += '\n';
              }

              if (approvalQueue.length) {
                body += `⚖️ PENDING YOUR APPROVAL (${approvalQueue.length}):\n`;
                approvalQueue.forEach(t => { body += `  • ${t.title}${t.escalated ? ' 🔴 ESCALATED' : ''}\n`; });
                body += '\n';
              }

              if (decisions.length) {
                body += `⏳ AWAITING YOUR DECISION (${decisions.length}):\n`;
                decisions.forEach(t => { body += `  • ${t.title}\n`; });
                body += '\n';
              }

              if (inputNeeded.length) {
                body += `💬 INPUT REQUESTED FROM YOU (${inputNeeded.length}):\n`;
                inputNeeded.forEach(t => { body += `  • ${t.title} (from ${t.inputRequestFrom||'team'})\n`; });
                body += '\n';
              }

              if (upcomingEvents.length) {
                body += `📅 UPCOMING EVENTS (14 days):\n`;
                upcomingEvents.forEach(e => {
                  const d = Math.ceil((new Date(e.date) - new Date(today)) / 86400000);
                  const when = d === 0 ? 'Today!' : d === 1 ? 'Tomorrow' : `in ${d} days`;
                  body += `  • ${e.name} — ${formatDate(e.date)} (${when})\n`;
                });
                body += '\n';
              }

              if (dueThisWeek.length) {
                body += `📋 DUE THIS WEEK:\n`;
                dueThisWeek.forEach(t => { body += `  • ${t.title} — ${formatDate(t.dueDate)}${t.dueDateType === 'hard' ? ' 🔴' : ''}\n`; });
                body += '\n';
              }

              if (tasks.length) {
                body += `📋 ALL ACTIVE TASKS (${tasks.length}):\n`;
                tasks.slice(0,12).forEach(t => { body += `  • ${t.title}\n`; });
                if (tasks.length > 12) body += `  ... and ${tasks.length - 12} more\n`;
                body += '\n';
              }

              if (!tasks.length && !briefing.length) body += `✝️ All clear today!\n\n`;

              body += `🔗 Open the app: ${APP_URL}${testNote}`;

              console.log(`Sending to ${personName}...`);
              try {
                const result = await request({
                  hostname: 'api.emailjs.com',
                  path: '/api/v1.0/email/send',
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'origin': 'https://ccfwb.github.io' }
                }, {
                  service_id: EMAILJS_SERVICE,
                  template_id: EMAILJS_TEMPLATE,
                  user_id: EMAILJS_KEY,
                  template_params: {
                    to_name: personName,
                    to_email: info.email,
                    subject: `CCFWB Morning Briefing — ${dateLabel}`,
                    message: body
                  }
                });
                console.log(`✅ Sent to ${personName}:`, result);
              } catch(e) {
                console.log(`❌ Failed for ${personName}:`, e.message);
              }

              await new Promise(r => setTimeout(r, 500));
            }

            console.log('Done!');
          }

          run().catch(e => { console.error(e); process.exit(1); });
          EOF
